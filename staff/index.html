<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เจ้าหน้าที่ — เข้าสู่ระบบ</title>
  <link rel="stylesheet" href="../theme.css" />
</head>
<body class="app-bg">
  <div class="app-bar">
    <img class="logo" data-logo alt="" />
    <div>
      <div class="title" data-event-name>ระบบเจ้าหน้าที่</div>
      <div class="subtitle">STAFF</div>
    </div>
  </div>

  <div class="container">
    <!-- login -->
    <div id="login" class="card gold-top" style="display:none">
      <h2>เข้าสู่ระบบเจ้าหน้าที่</h2>
      <div class="field">
        <label>ชื่อผู้ใช้</label>
        <input class="input" id="username" autocapitalize="off" autocomplete="username" />
      </div>
      <div class="field">
        <label>รหัสผ่าน</label>
        <input class="input" id="password" type="password" autocomplete="current-password" />
      </div>
      <div class="field">
        <label>รหัสเข้าระบบงาน <span class="muted">(ถ้าผู้ดูแลตั้งไว้)</span></label>
        <input class="input" id="accesscode" placeholder="เว้นว่างได้ถ้ายังไม่ตั้ง" />
      </div>
      <button class="btn btn-primary mt" id="loginBtn" onclick="doLogin()">เข้าสู่ระบบ</button>
    </div>

    <!-- menu -->
    <div id="menu" style="display:none">
      <div class="card gold-top">
        <h2>สวัสดี <span id="whoami"></span></h2>
        <p class="muted" id="rolelabel"></p>
      </div>
      <div class="card">
        <button class="btn btn-gold" onclick="location.href='scan.html'">📷 สแกนเข้างาน / เช็คอิน</button>
        <div id="adminLinks" style="display:none">
          <hr class="gold-divider" />
          <p class="muted" style="margin-bottom:8px">เมนูผู้ดูแล (ADMIN)</p>
          <button class="btn btn-ghost" style="margin-bottom:10px" onclick="location.href='../admin/remote.html'">🎯 รีโมทจับรางวัล</button>
          <button class="btn btn-ghost" style="margin-bottom:10px" onclick="location.href='../admin/rewards.html'">🎡 จอวงล้อ</button>
          <button class="btn btn-ghost" onclick="location.href='../admin/settings.html'">⚙️ ตั้งค่า / จัดการ</button>
        </div>
      </div>
      <button class="btn btn-ghost" style="background:#fff" onclick="logout()">ออกจากระบบ</button>
    </div>

    <div id="loading" class="loading"><div class="spinner"></div>กำลังโหลด...</div>
  </div>

  <script src="../config.js"></script>
  <script src="../api.js"></script>
  <script>
    (async function () {
      await API.bootTheme().catch(function () {});
      API.qs('#loading').style.display = 'none';
      var s = API.getSession();
      if (s && s.username) showMenu(s);
      else API.qs('#login').style.display = 'block';
    })();

    function showMenu(s) {
      API.qs('#login').style.display = 'none';
      API.qs('#menu').style.display = 'block';
      API.qs('#whoami').textContent = s.display_name || s.username;
      API.qs('#rolelabel').textContent = (s.role === 'admin') ? 'สิทธิ์: ผู้ดูแล (admin)' : 'สิทธิ์: เจ้าหน้าที่ (staff)';
      if (s.role === 'admin') API.qs('#adminLinks').style.display = 'block';
    }

    async function doLogin() {
      var u = API.qs('#username').value.trim();
      var p = API.qs('#password').value;
      var code = API.qs('#accesscode').value.trim();
      if (!u || !p) return API.toast('กรอกชื่อผู้ใช้และรหัสผ่าน');

      var btn = API.qs('#loginBtn'); btn.disabled = true; btn.textContent = 'กำลังเข้าสู่ระบบ...';
      API.setKey('access-code', code); // เก็บรหัสเข้าระบบไว้บนเครื่อง

      try {
        var res = await API.post('staffLogin', { username: u, password: p });
        if (!res.ok) { fail(btn, 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง'); return; }

        // ตรวจรหัสเข้าระบบ (เรียก action ที่ต้องมี key)
        var chk = await API.getAuth('getStaff', {}, code);
        if (!chk.ok && /unauth/i.test(chk.error || '')) { API.clearKey('access-code'); fail(btn, 'รหัสเข้าระบบงานไม่ถูกต้อง'); return; }

        var sess = { username: res.username, display_name: res.display_name, role: res.role };
        API.setSession(sess);
        showMenu(sess);
      } catch (e) { fail(btn, e.message); }
    }

    function fail(btn, msg) {
      API.toast(msg);
      btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ';
    }

    function logout() {
      API.clearSession();
      location.reload();
    }
  </script>
</body>
</html>
