<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เจ้าหน้าที่ — เมนูหลัก</title>
  <link rel="stylesheet" href="../theme.css" />
</head>
<body class="app-bg">
  <div class="app-bar">
    <img class="logo" data-logo alt="" />
    <div>
      <div class="title" data-event-name>ระบบเจ้าหน้าที่</div>
      <div class="subtitle" id="role-badge">STAFF</div>
    </div>
  </div>

  <div class="container">
    <div id="loading" class="loading"><div class="spinner"></div>กำลังโหลด...</div>

    <div id="menu" style="display:none">
      <div class="card gold-top">
        <h2 style="margin:0 0 4px">สวัสดี <span id="whoami"></span></h2>
        <p class="muted" id="rolelabel" style="margin:0"></p>
      </div>

      <!-- เมนู Staff -->
      <div class="card">
        <button type="button" class="btn btn-gold" onclick="location.href='scan.html'">📷 สแกนเข้างาน / เช็คอิน</button>
      </div>

      <!-- เมนู Admin (แสดงเฉพาะ role = admin) -->
      <div id="adminLinks" style="display:none">
        <div class="card">
          <p class="muted" style="margin:0 0 10px;font-weight:600">เมนูผู้ดูแล (ADMIN)</p>
          <button type="button" class="btn btn-ghost" style="margin-bottom:10px" onclick="location.href='../admin/remote.html'">🎯 รีโมทจับรางวัล</button>
          <button type="button" class="btn btn-ghost" style="margin-bottom:10px" onclick="location.href='../admin/rewards.html'">🎡 จอวงล้อ</button>
          <button type="button" class="btn btn-ghost" style="margin-bottom:10px" onclick="location.href='../admin/orders.html'">📦 คำสั่งซื้อ</button>
          <button type="button" class="btn btn-ghost" style="margin-bottom:10px" onclick="location.href='../admin/products.html'">🛍️ จัดการสินค้า</button>
          <button type="button" class="btn btn-ghost" onclick="location.href='../admin/settings.html'">⚙️ ตั้งค่า / จัดการ</button>
        </div>
      </div>

      <button type="button" class="btn btn-ghost" style="background:#fff" onclick="logout()">ออกจากระบบ</button>
    </div>
  </div>

  <script src="../config.js"></script>
  <script src="../api.js"></script>
  <script>
    (async function () {
      await API.bootTheme().catch(function () {});
      var s = API.getSession();
      if (!s || !s.username) {
        location.replace('../login.html');
        return;
      }
      API.qs('#loading').style.display = 'none';
      API.qs('#menu').style.display = 'block';
      API.qs('#whoami').textContent = s.display_name || s.username;
      API.qs('#rolelabel').textContent = s.role === 'admin' ? 'สิทธิ์: ผู้ดูแล (admin)' : 'สิทธิ์: เจ้าหน้าที่ (staff)';
      API.qs('#role-badge').textContent = s.role === 'admin' ? 'ADMIN' : 'STAFF';
      if (s.role === 'admin') API.qs('#adminLinks').style.display = 'block';
    })();

    function logout() {
      API.clearSession();
      API.clearKey('access-code');
      location.replace('../login.html');
    }
  </script>
</body>
</html>
