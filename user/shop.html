<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛍️ ร้านค้า</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&family=Trirong:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../theme.css">
    <style>
        body { background: #f5f5f5; padding: 10px; }
        .shop-container { max-width: 500px; margin: 0 auto; }
        .tab-nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-nav button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; transition: all 0.3s; }
        .tab-nav button { background: #e0e0e0; color: #333; }
        .tab-nav button.active { background: var(--color-primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Products */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .product-card { background: white; border-radius: 8px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.2s; }
        .product-card:active { transform: scale(0.98); }
        .product-img { width: 100%; height: 120px; object-fit: cover; border-radius: 6px; margin-bottom: 8px; }
        .product-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .product-price { color: var(--color-accent); font-weight: 700; font-size: 15px; margin-bottom: 2px; }
        .product-stock { font-size: 12px; color: #666; }
        .stock-0 { color: #d32f2f; }

        /* Cart */
        .cart-item { background: white; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; gap: 10px; }
        .cart-img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
        .cart-img-placeholder { width: 60px; height: 60px; background: #f0f0f0; border-radius: 6px; flex-shrink: 0; }
        .cart-info { flex: 1; min-width: 0; }
        .cart-name { font-weight: 600; font-size: 14px; }
        .cart-variant { font-size: 12px; color: #888; margin-bottom: 2px; }
        .cart-price { color: var(--color-accent); font-weight: 700; }
        .qty-control { display: flex; gap: 6px; align-items: center; font-size: 12px; flex-shrink: 0; }
        .qty-control button { width: 26px; height: 26px; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; font-size: 16px; line-height: 1; }
        .qty-display { min-width: 28px; text-align: center; font-weight: 600; }
        .cart-empty { text-align: center; padding: 40px 20px; color: #999; }
        .cart-total { background: white; padding: 16px; border-radius: 8px; margin: 16px 0; }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .total-amount { display: flex; justify-content: space-between; font-weight: 700; font-size: 18px; color: var(--color-primary); }

        /* Payment */
        .payment-section { background: white; padding: 16px; border-radius: 8px; margin-bottom: 16px; }
        .qr-container { text-align: center; margin: 16px 0; }
        .qr-img { max-width: 100%; height: auto; border-radius: 8px; border: 2px solid var(--color-accent); }
        .qr-note { font-size: 13px; color: #666; margin-top: 8px; }
        .slip-upload { margin: 16px 0; }
        .slip-label { display: block; padding: 12px; background: #f0f0f0; border-radius: 6px; cursor: pointer; text-align: center; font-weight: 600; color: var(--color-primary); transition: all 0.2s; }
        .slip-label:hover { background: #e8e8e8; }
        .slip-input { display: none; }
        .slip-preview { margin: 12px 0; }
        .slip-img { max-width: 100%; height: auto; border-radius: 8px; }
        .slip-amount { margin: 12px 0; padding: 12px; background: #f9f9f9; border-left: 3px solid var(--color-accent); border-radius: 4px; }
        .slip-amount-label { font-size: 12px; color: #666; }
        .slip-amount-input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; margin-top: 6px; }

        /* Buttons */
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: Sarabun; }
        .btn-primary { background: var(--color-primary); color: white; }
        .btn-primary:active { opacity: 0.9; }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
        .btn-secondary { background: var(--color-accent); color: #333; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: Sarabun; box-sizing: border-box; }

        .loading { text-align: center; padding: 20px; color: #666; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid var(--color-primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Variant modal */
        .opt-modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:200; align-items:flex-end; justify-content:center; }
        .opt-modal-bg.open { display:flex; }
        .opt-modal { background:#fff; border-radius:18px 18px 0 0; padding:0; width:100%; max-width:480px; max-height:88vh; overflow-y:auto; display:flex; flex-direction:column; }

        /* ── Image Slider ── */
        .modal-slider { position:relative; width:100%; overflow:hidden; border-radius:18px 18px 0 0; background:#0a0a0a; flex-shrink:0; -webkit-user-select:none; user-select:none; touch-action:pan-y; }
        .modal-slider-track { display:flex; width:100%; flex-wrap:nowrap; will-change:transform; }
        .modal-slider-slide { min-width:100%; flex-shrink:0; position:relative; }
        .modal-slider-slide img { width:100%; height:280px; object-fit:cover; display:block; }
        .modal-slide-ph { width:100%; height:280px; background:#1a1a1a; display:flex; align-items:center; justify-content:center; font-size:60px; }
        .modal-slider-dots { position:absolute; bottom:10px; left:0; right:0; display:flex; justify-content:center; gap:5px; pointer-events:none; }
        .modal-dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.45); transition:all .25s; }
        .modal-dot.active { background:#fff; width:20px; border-radius:4px; }
        .modal-slider-arrow { position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,.8); border:none; border-radius:50%; width:34px; height:34px; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1; box-shadow:0 2px 6px rgba(0,0,0,.3); }
        .modal-slider-arrow.prev { left:10px; }
        .modal-slider-arrow.next { right:10px; }
        .modal-slider-count { position:absolute; top:10px; right:12px; background:rgba(0,0,0,.5); color:#fff; font-size:11px; font-weight:600; padding:3px 10px; border-radius:999px; -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); }

        /* ── Modal body ── */
        .modal-body { padding:18px 20px 32px; }
        .opt-modal h3 { margin:0 0 14px; font-family:Trirong; color:var(--color-primary); font-size:18px; }
        .opt-section { margin-bottom:14px; }
        .opt-section label { display:block; font-weight:600; font-size:14px; margin-bottom:8px; color:#555; }
        .opt-pills { display:flex; flex-wrap:wrap; gap:8px; }
        .opt-pill { padding:8px 16px; border:1.5px solid #ddd; border-radius:999px; background:#fff; cursor:pointer; font-family:Sarabun; font-size:14px; transition:all .15s; }
        .opt-pill.selected { background:var(--color-primary); color:#fff; border-color:var(--color-primary); }
        .opt-pill.out-of-stock { opacity:.35; cursor:not-allowed; text-decoration:line-through; }
        .variant-info-box { padding:12px 14px; background:#f0f4ff; border-radius:10px; margin:12px 0; display:none; }
        .variant-info-price { font-weight:700; color:var(--color-primary); font-size:22px; }
        .variant-info-stock { font-size:13px; color:#666; margin-top:2px; }
        .variant-info-stock.no-stock { color:#d32f2f; font-weight:600; }
    </style>
</head>
<body>
    <div class="shop-container">
        <h1 style="text-align:center;color:var(--color-primary);font-family:Trirong;margin:20px 0;">🛍️ ร้านค้า</h1>

        <div class="tab-nav">
            <button class="tab-btn active" data-tab="products">📦 สินค้า</button>
            <button class="tab-btn" data-tab="cart">🛒 ตะกร้า</button>
            <button class="tab-btn" data-tab="payment">💳 ชำระเงิน</button>
        </div>

        <!-- Products Tab -->
        <div id="products" class="tab-content active">
            <div class="loading" id="products-loading">
                <div class="spinner"></div> กำลังโหลดสินค้า...
            </div>
            <div class="product-grid" id="products-grid" style="display:none"></div>
        </div>

        <!-- Variant Selector Modal -->
        <div class="opt-modal-bg" id="opt-modal-bg" onclick="closeOptModal(event)">
            <div class="opt-modal" id="opt-modal">

                <!-- Image Slider -->
                <div class="modal-slider" id="modal-slider"
                     ontouchstart="sliderTouchStart(event)"
                     ontouchmove="sliderTouchMove(event)"
                     ontouchend="sliderTouchEnd(event)">
                    <div class="modal-slider-track" id="modal-slider-track"></div>
                    <div class="modal-slider-dots" id="modal-slider-dots"></div>
                    <button type="button" class="modal-slider-arrow prev" id="slider-prev" onclick="goSlide(sliderIndex-1)">‹</button>
                    <button type="button" class="modal-slider-arrow next" id="slider-next" onclick="goSlide(sliderIndex+1)">›</button>
                    <div class="modal-slider-count" id="slider-count"></div>
                </div>

                <!-- Content -->
                <div class="modal-body">
                    <h3 id="opt-modal-title">เลือกตัวเลือก</h3>
                    <div id="opt-color-section" class="opt-section">
                        <label>สี</label>
                        <div class="opt-pills" id="opt-colors"></div>
                    </div>
                    <div id="opt-size-section" class="opt-section">
                        <label>ขนาด</label>
                        <div class="opt-pills" id="opt-sizes"></div>
                    </div>
                    <div class="variant-info-box" id="opt-variant-info">
                        <div class="variant-info-price" id="opt-variant-price"></div>
                        <div class="variant-info-stock" id="opt-variant-stock"></div>
                    </div>
                    <button type="button" class="btn btn-primary" id="opt-confirm-btn" onclick="confirmOptModal()" style="margin-top:8px" disabled>✓ เพิ่มลงตะกร้า</button>
                    <button type="button" class="btn" onclick="document.getElementById('opt-modal-bg').classList.remove('open')" style="margin-top:8px;background:#f0f0f0;">ยกเลิก</button>
                </div>

            </div>
        </div>

        <!-- Cart Tab -->
        <div id="cart" class="tab-content">
            <div id="cart-list"></div>
            <div id="cart-total" class="cart-total" style="display:none">
                <div class="total-row">
                    <span>สินค้า:</span>
                    <span id="subtotal">฿0</span>
                </div>
                <div class="total-amount">
                    <span>รวม:</span>
                    <span id="total">฿0</span>
                </div>
            </div>
        </div>

        <!-- Payment Tab -->
        <div id="payment" class="tab-content">
            <div class="payment-section">
                <h3 style="margin-top:0;font-family:Trirong;">ข้อมูลผู้สั่ง</h3>
                <div class="form-group">
                    <label>ชื่อ-นามสกุล</label>
                    <input type="text" id="customer-name" placeholder="ชื่อเต็ม">
                </div>
                <div class="form-group">
                    <label>เบอร์โทรศัพท์</label>
                    <input type="tel" id="customer-phone" placeholder="08xxxxxxxx">
                </div>
            </div>

            <div class="payment-section">
                <h3 style="margin-top:0;font-family:Trirong;">💳 วิธีชำระเงิน: PromptPay</h3>
                <div class="qr-container">
                    <img id="promptpay-qr" class="qr-img" src="" alt="PromptPay QR">
                    <div class="qr-note" id="promptpay-note">รหัสทรัพย์สิน: โหลดเดี๋ยว...</div>
                </div>
                <h4 style="font-family:Trirong;margin-top:20px;">📸 อัปโหลดสลิปการโอน</h4>
                <div class="slip-upload">
                    <label class="slip-label" for="slip-file">📤 เลือกรูปสลิป</label>
                    <input type="file" id="slip-file" class="slip-input" accept="image/*">
                </div>
                <div id="slip-preview" class="slip-preview"></div>
                <div class="slip-amount">
                    <div class="slip-amount-label">ยอดเงินที่โอน (฿)</div>
                    <input type="number" class="slip-amount-input" id="slip-amount" placeholder="เช่น 1500" step="0.01">
                </div>
            </div>

            <div class="payment-section">
                <div class="total-row">
                    <span style="font-weight:600;">ยอดรวม:</span>
                    <span style="font-weight:700;font-size:18px;color:var(--color-primary)" id="final-total">฿0</span>
                </div>
            </div>

            <button type="button" class="btn btn-primary" id="submit-order" style="margin-bottom:16px;">
                ✓ ยืนยันการสั่งซื้อ
            </button>
        </div>
    </div>

    <script src="https://liff.line.me/sdk/web/liff.js"></script>
    <script src="../config.js"></script>
    <script src="../api.js"></script>
    <script>
        let cart = {};
        let products = [];
        let settings = {};
        let profileData = {};
        let isLIFF = false;

        // modal state
        let pendingProduct  = null;
        let selectedColor   = null;
        let selectedSize    = null;
        let selectedVariant = null;

        // ════════════════════════════════
        //  Image Slider (modal)
        // ════════════════════════════════
        let sliderImages = [];
        let sliderIndex  = 0;
        let touchX0 = 0, touchDX = 0, dragging = false;

        function initSlider(imgs) {
            sliderImages = imgs.filter(Boolean);
            sliderIndex  = 0;
            const wrap = document.getElementById('modal-slider');
            if (!sliderImages.length) { wrap.style.display = 'none'; return; }
            wrap.style.display = '';
            _renderSlider();
        }

        function _renderSlider() {
            const total = sliderImages.length;
            document.getElementById('modal-slider-track').innerHTML =
                sliderImages.map((id, i) =>
                    `<div class="modal-slider-slide">` +
                    (id ? `<img src="${API.driveImg(id,900)}" alt="รูป ${i+1}" loading="${i===0?'eager':'lazy'}"` +
                          ` onerror="this.outerHTML='<div class=\\'modal-slide-ph\\'>📦</div>'">` :
                          `<div class="modal-slide-ph">📦</div>`) +
                    `</div>`
                ).join('');
            document.getElementById('modal-slider-dots').innerHTML =
                total > 1 ? sliderImages.map((_,i) =>
                    `<div class="modal-dot${i===sliderIndex?' active':''}"></div>`
                ).join('') : '';
            document.getElementById('slider-count').textContent  = total > 1 ? (sliderIndex+1)+'/'+total : '';
            document.getElementById('slider-prev').style.display = total > 1 ? '' : 'none';
            document.getElementById('slider-next').style.display = total > 1 ? '' : 'none';
            _applySlide(false);
        }

        function _applySlide(animate) {
            const track = document.getElementById('modal-slider-track');
            track.style.transition = animate ? 'transform .32s cubic-bezier(.4,0,.2,1)' : 'none';
            track.style.transform  = `translateX(-${sliderIndex*100}%)`;
            document.querySelectorAll('#modal-slider-dots .modal-dot').forEach((d,i) =>
                d.classList.toggle('active', i === sliderIndex));
            document.getElementById('slider-count').textContent =
                sliderImages.length > 1 ? (sliderIndex+1)+'/'+sliderImages.length : '';
        }

        function goSlide(i) {
            if (!sliderImages.length) return;
            sliderIndex = Math.max(0, Math.min(i, sliderImages.length - 1));
            _applySlide(true);
        }

        // Touch swipe
        function sliderTouchStart(e) {
            touchX0 = e.touches[0].clientX;
            window._sliderTouchY0 = e.touches[0].clientY;
            touchDX = 0; dragging = true;
            document.getElementById('modal-slider-track').style.transition = 'none';
        }
        function sliderTouchMove(e) {
            if (!dragging) return;
            const dy = e.touches[0].clientY - (window._sliderTouchY0 || e.touches[0].clientY);
            touchDX = e.touches[0].clientX - touchX0;
            if (Math.abs(touchDX) > Math.abs(dy)) e.preventDefault(); // ป้องกัน scroll แนวตั้ง
            const pct = touchDX / document.getElementById('modal-slider').offsetWidth * 100;
            document.getElementById('modal-slider-track').style.transform =
                `translateX(calc(-${sliderIndex*100}% + ${pct}%))`;
        }
        function sliderTouchEnd() {
            dragging = false;
            if (Math.abs(touchDX) > 50) {
                goSlide(touchDX < 0 ? sliderIndex + 1 : sliderIndex - 1);
            } else {
                _applySlide(true);
            }
        }

        async function initShop() {
            try {
                try {
                    await API.liffInit(true);
                    isLIFF = true;
                    profileData = await API.getProfile();
                    if (profileData && profileData.displayName) {
                        document.getElementById('customer-name').value = profileData.displayName;
                    }
                } catch (liffErr) {
                    isLIFF = false;
                }
                await Promise.all([loadProducts(), loadSettings()]);
            } catch (err) {
                API.toast('❌ เกิดข้อผิดพลาด: ' + err.message, 'error');
            }
        }

        async function loadProducts() {
            try {
                const res = await API.get('getProducts');
                products = res.products || [];
                renderProducts();
                document.getElementById('products-loading').style.display = 'none';
                document.getElementById('products-grid').style.display = 'grid';
            } catch (err) {
                document.getElementById('products-loading').innerHTML = '❌ โหลดสินค้าผิดพลาด';
            }
        }

        async function loadSettings() {
            try {
                const res = await API.get('getSettings');
                settings = res.settings || {};
                if (settings.promptpay_file_id) {
                    document.getElementById('promptpay-qr').src = API.driveImg(settings.promptpay_file_id, 1000);
                    document.getElementById('promptpay-note').textContent = '📲 สแกน QR เพื่อชำระเงิน';
                }
            } catch (err) { /* optional */ }
        }

        // ---- render product cards ----
        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            products.forEach(p => {
                const imgs = [p.img_url1,p.img_url2,p.img_url3,p.img_url4,p.img_url5].filter(Boolean);
                const imgSrc = imgs.length ? API.driveImg(imgs[0], 500) : '';
                const isOutOfStock = (p.totalStock || 0) === 0;
                const minP = p.minPrice || 0;
                const maxP = p.maxPrice || 0;
                const priceStr = minP === maxP
                    ? API.fmtBaht(minP)
                    : 'เริ่ม ' + API.fmtBaht(minP);

                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    ${imgSrc ? `<img class="product-img" src="${imgSrc}" alt="${p.name}" onerror="this.style.display='none'">` : ''}
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">${priceStr}</div>
                    <div class="product-stock ${isOutOfStock ? 'stock-0' : ''}">
                        ${isOutOfStock ? '❌ หมด' : '✓ มีสินค้า'}
                    </div>`;
                if (!isOutOfStock) card.addEventListener('click', () => addToCart(p));
                grid.appendChild(card);
            });
        }

        // ---- variant selection ----
        function addToCart(product) {
            const variants = Array.isArray(product.variants) ? product.variants.filter(v => v.stock > 0) : [];
            if (!variants.length && product.minPrice) {
                // backward-compat: product without variants
                doAddToCart(product, { sku: product.id, sellPrice: product.minPrice, stock: product.totalStock, color: '', size: '' });
                return;
            }
            if (variants.length === 1) {
                doAddToCart(product, variants[0]);
                return;
            }
            openVariantModal(product);
        }

        function openVariantModal(product) {
            pendingProduct  = product;
            selectedColor   = null;
            selectedSize    = null;
            selectedVariant = null;

            // init image slider
            initSlider([product.img_url1, product.img_url2, product.img_url3,
                        product.img_url4, product.img_url5]);

            const allVariants = Array.isArray(product.variants) ? product.variants : [];
            const colors = [...new Set(allVariants.map(v => v.color).filter(Boolean))];
            const sizes  = [...new Set(allVariants.map(v => v.size).filter(Boolean))];

            document.getElementById('opt-modal-title').textContent = product.name;

            const colorSec = document.getElementById('opt-color-section');
            const sizeSec  = document.getElementById('opt-size-section');

            if (colors.length > 0) {
                colorSec.style.display = '';
                document.getElementById('opt-colors').innerHTML = colors.map(c => {
                    const hasStock = allVariants.some(v => v.color === c && v.stock > 0);
                    return `<button type="button" class="opt-pill${hasStock?'':' out-of-stock'}" onclick="${hasStock?`selectColor('${c}')`:'void(0)'}">${c}</button>`;
                }).join('');
            } else {
                colorSec.style.display = 'none';
                selectedColor = '';
            }

            if (sizes.length > 0) {
                sizeSec.style.display = '';
                renderSizePills(null);
            } else {
                sizeSec.style.display = 'none';
                selectedSize = '';
            }

            updateVariantInfo();
            document.getElementById('opt-modal-bg').classList.add('open');
        }

        function selectColor(color) {
            selectedColor = color;
            document.querySelectorAll('#opt-colors .opt-pill').forEach(p => {
                p.classList.toggle('selected', p.textContent.trim() === color);
            });
            selectedSize = null;
            renderSizePills(color);
            updateVariantInfo();
        }

        function renderSizePills(filterColor) {
            const allVariants = pendingProduct ? (pendingProduct.variants || []) : [];
            const filtered = filterColor !== null
                ? allVariants.filter(v => v.color === filterColor)
                : allVariants;
            const sizes = [...new Set(filtered.map(v => v.size).filter(Boolean))];
            document.getElementById('opt-sizes').innerHTML = sizes.map(s => {
                const hasStock = filtered.some(v => v.size === s && v.stock > 0);
                return `<button type="button" class="opt-pill${hasStock?'':' out-of-stock'}" onclick="${hasStock?`selectSize('${s}')`:'void(0)'}">${s}</button>`;
            }).join('');
        }

        function selectSize(size) {
            selectedSize = size;
            document.querySelectorAll('#opt-sizes .opt-pill').forEach(p => {
                p.classList.toggle('selected', p.textContent.trim() === size);
            });
            updateVariantInfo();
        }

        function updateVariantInfo() {
            const allVariants = pendingProduct ? (pendingProduct.variants || []) : [];
            const colors = [...new Set(allVariants.map(v => v.color).filter(Boolean))];
            const sizes  = [...new Set(allVariants.map(v => v.size).filter(Boolean))];

            let match = null;
            if (selectedColor !== null && selectedSize !== null) {
                match = allVariants.find(v => {
                    const cOk = !colors.length || v.color === selectedColor;
                    const sOk = !sizes.length  || v.size  === selectedSize;
                    return cOk && sOk;
                });
            } else if (selectedColor !== null && !sizes.length) {
                match = allVariants.find(v => v.color === selectedColor);
            } else if (selectedSize !== null && !colors.length) {
                match = allVariants.find(v => v.size === selectedSize);
            }

            selectedVariant = match || null;
            const infoBox   = document.getElementById('opt-variant-info');
            const confirmBtn = document.getElementById('opt-confirm-btn');

            if (match) {
                infoBox.style.display = '';
                document.getElementById('opt-variant-price').textContent = API.fmtBaht(match.sellPrice);
                const stockEl = document.getElementById('opt-variant-stock');
                if (match.stock <= 0) {
                    stockEl.textContent = '❌ หมดสต็อก';
                    stockEl.className = 'variant-info-stock no-stock';
                    confirmBtn.disabled = true;
                } else {
                    stockEl.textContent = 'สต็อก ' + match.stock + ' ชิ้น';
                    stockEl.className = 'variant-info-stock';
                    confirmBtn.disabled = false;
                }
            } else {
                infoBox.style.display = 'none';
                confirmBtn.disabled = true;
            }
        }

        function confirmOptModal() {
            if (!pendingProduct || !selectedVariant) return;
            document.getElementById('opt-modal-bg').classList.remove('open');
            doAddToCart(pendingProduct, selectedVariant);
            pendingProduct = null;
        }

        function closeOptModal(e) {
            if (e.target === document.getElementById('opt-modal-bg')) {
                document.getElementById('opt-modal-bg').classList.remove('open');
            }
        }

        function doAddToCart(product, variant) {
            const cartKey = product.id + '_' + (variant.sku || (variant.color||'') + '_' + (variant.size||''));
            if (!cart[cartKey]) {
                cart[cartKey] = {
                    id: product.id,
                    name: product.name,
                    img_url1: product.img_url1 || '',
                    sku: variant.sku || '',
                    color: variant.color || '',
                    size: variant.size  || '',
                    sellPrice: variant.sellPrice || 0,
                    variantStock: variant.stock  || 0,
                    qty: 0,
                    _cartKey: cartKey
                };
            }
            if (cart[cartKey].qty >= cart[cartKey].variantStock) {
                API.toast('❌ สต็อกไม่พอ', 'error');
                return;
            }
            cart[cartKey].qty++;
            API.setKey('shop-cart', JSON.stringify(cart));
            renderCart();
            const label = [variant.color, variant.size].filter(Boolean).join(' ');
            API.toast('✓ เพิ่ม ' + product.name + (label ? ' (' + label + ')' : '') + ' แล้ว', 'success');
        }

        // ---- render cart ----
        function renderCart() {
            const cartList = document.getElementById('cart-list');
            const items = Object.values(cart).filter(i => i.qty > 0);
            if (items.length === 0) {
                cartList.innerHTML = '<div class="cart-empty">🛒 ตะกร้าว่าง</div>';
                document.getElementById('cart-total').style.display = 'none';
                return;
            }
            cartList.innerHTML = items.map(item => {
                const imgSrc = item.img_url1 ? API.driveImg(item.img_url1, 300) : '';
                const varLabel = [item.color, item.size].filter(Boolean).join(' ');
                const key = item._cartKey;
                return `
                <div class="cart-item">
                    ${imgSrc ? `<img class="cart-img" src="${imgSrc}" alt="" onerror="this.style.display='none'">` : '<div class="cart-img-placeholder"></div>'}
                    <div class="cart-info">
                        <div class="cart-name">${item.name}</div>
                        ${varLabel ? `<div class="cart-variant">${varLabel}</div>` : ''}
                        <div class="cart-price">${API.fmtBaht(item.sellPrice)}</div>
                    </div>
                    <div class="qty-control">
                        <button type="button" onclick="changeQty('${key}', -1)">−</button>
                        <div class="qty-display">${item.qty}</div>
                        <button type="button" onclick="changeQty('${key}', 1)">+</button>
                    </div>
                </div>`;
            }).join('');
            const subtotal = items.reduce((sum, i) => sum + (i.sellPrice || 0) * i.qty, 0);
            document.getElementById('subtotal').textContent   = API.fmtBaht(subtotal);
            document.getElementById('total').textContent      = API.fmtBaht(subtotal);
            document.getElementById('final-total').textContent = API.fmtBaht(subtotal);
            document.getElementById('cart-total').style.display = 'block';
        }

        function changeQty(cartKey, delta) {
            if (cart[cartKey]) {
                cart[cartKey].qty += delta;
                if (cart[cartKey].qty <= 0) delete cart[cartKey];
                API.setKey('shop-cart', JSON.stringify(cart));
                renderCart();
            }
        }

        // ---- slip upload ----
        document.getElementById('slip-file').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                document.getElementById('slip-preview').innerHTML = `<img class="slip-img" src="${ev.target.result}" alt="slip">`;
                try {
                    const result = await API.ocrReceiptAmount(ev.target.result.split(',')[1]);
                    if (result && result.success) {
                        document.getElementById('slip-amount').value = result.amount.toFixed(2);
                        API.toast('✓ อ่านยอด: ฿' + result.amount.toFixed(2), 'success');
                    } else {
                        document.getElementById('slip-amount').focus();
                    }
                } catch (err) {
                    document.getElementById('slip-amount').focus();
                }
            };
            reader.readAsDataURL(file);
        });

        // ---- submit order ----
        document.getElementById('submit-order').addEventListener('click', async () => {
            const items = Object.values(cart).filter(i => i.qty > 0);
            if (!items.length) { API.toast('❌ เลือกสินค้าก่อน', 'error'); return; }

            const name   = document.getElementById('customer-name').value.trim();
            const phone  = document.getElementById('customer-phone').value.trim();
            const amount = parseFloat(document.getElementById('slip-amount').value);
            const slipImg = document.getElementById('slip-preview').querySelector('img');
            if (!name || !phone || !amount || !slipImg) {
                API.toast('❌ กรอกข้อมูลให้ครบและแนบสลิป', 'error'); return;
            }

            const btn = document.getElementById('submit-order');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner" style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;vertical-align:middle;margin-right:6px"></div> กำลังส่ง...';

            try {
                const uploadRes = await API.post('uploadSlip', {
                    dataUrl: slipImg.src,
                    filename: 'slip_' + Date.now() + '.jpg'
                });
                const slipUrl = uploadRes.url || '';

                // build items list for order
                const itemsData = items.map(i => ({
                    name:  i.name,
                    sku:   i.sku,
                    color: i.color,
                    size:  i.size,
                    price: i.sellPrice,
                    qty:   i.qty
                }));
                const total = items.reduce((sum, i) => sum + (i.sellPrice||0) * i.qty, 0);

                await API.post('createOrder', {
                    line_user_id:  profileData.userId || '',
                    customer_name: name,
                    phone:         phone,
                    items:         JSON.stringify(itemsData),
                    total_amount:  total,
                    slip_url:      slipUrl,
                    slip_amount:   amount
                });
                API.toast('✓ ส่งใบสั่งซื้อแล้ว! Staff จะยืนยันเดี๋ยว', 'success');
                clearCart();
            } catch (err) {
                API.toast('❌ ส่งใบสั่งซื้อผิดพลาด: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '✓ ยืนยันการสั่งซื้อ';
            }
        });

        function clearCart() {
            cart = {};
            API.setKey('shop-cart', '{}');
            renderCart();
        }

        // ---- tab navigation ----
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                const tabId = btn.dataset.tab;
                document.getElementById(tabId).classList.add('active');
                if (tabId === 'cart') renderCart();
            });
        });

        initShop();
    </script>
</body>
</html>
