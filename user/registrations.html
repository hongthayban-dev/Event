<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>ลงทะเบียนเข้างาน</title>
  <link rel="stylesheet" href="../theme.css" />
  <style>
    /* ===== Luxury Lanyard ID Card ===== */
    .modal {
      position: fixed; inset: 0;
      background: rgba(5, 15, 40, .88);
      display: none; align-items: center; justify-content: center;
      padding: 16px; z-index: 1000;
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }
    .modal.open { display: flex; }

    /* ---- Lanyard ---- */
    .card-wrap { display: flex; flex-direction: column; align-items: center; }

    .lanyard-hole {
      width: 48px; height: 48px;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
      position: relative;
    }
    .lanyard-hole::before {
      content: '';
      position: absolute; top: 4px; left: 50%; transform: translateX(-50%);
      width: 18px; height: 18px;
      border: 2.5px solid #d4af37;
      border-radius: 50%;
      background: rgba(212,175,55,.12);
      box-shadow: 0 0 8px rgba(212,175,55,.3);
    }
    .lanyard-hole::after {
      content: '';
      display: block; width: 3px; height: 22px;
      background: linear-gradient(to bottom, #d4af37, rgba(212,175,55,0));
    }

    /* ---- Card ---- */
    .idcard {
      width: 100%; max-width: 300px;
      border-radius: 20px; overflow: hidden;
      box-shadow:
        0 32px 80px rgba(0,0,0,.7),
        0 0 0 1px rgba(212,175,55,.45),
        inset 0 1px 0 rgba(255,255,255,.12);
      animation: cardPop .42s cubic-bezier(.18,.89,.32,1.28);
    }
    @keyframes cardPop {
      from { transform: scale(.78) translateY(30px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }

    /* Header */
    .ic-head {
      background: linear-gradient(155deg, #071840 0%, #132f6e 45%, #0d2b5e 100%);
      padding: 18px 18px 16px;
      position: relative; overflow: hidden;
    }
    .ic-head::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 15% 60%, rgba(240,192,64,.07) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, rgba(255,255,255,.05) 0%, transparent 45%);
      pointer-events: none;
    }
    /* Gold shimmer top */
    .ic-top-shimmer {
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent 0%, #d4af37 20%, #fff8d4 50%, #d4af37 80%, transparent 100%);
    }
    /* Corner accents */
    .ic-head::after {
      content: '';
      position: absolute; top: 12px; right: 12px;
      width: 20px; height: 20px;
      border-top: 1.5px solid rgba(212,175,55,.55);
      border-right: 1.5px solid rgba(212,175,55,.55);
      border-radius: 0 5px 0 0;
    }

    .ic-logo-row {
      display: flex; align-items: center; gap: 10px;
      position: relative; z-index: 1;
    }
    .ic-logo-row img {
      width: 38px; height: 38px; object-fit: contain;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,.45)) brightness(1.05);
      border-radius: 6px; flex-shrink: 0;
    }
    .ic-event-name {
      font-family: var(--font-display); font-weight: 700;
      font-size: .95rem; color: #ffffff; line-height: 1.3;
      text-shadow: 0 1px 4px rgba(0,0,0,.35);
    }
    .ic-event-tag {
      font-size: .58rem; color: #f0c040; letter-spacing: 2.5px;
      text-transform: uppercase; margin-top: 3px; font-weight: 500;
    }

    /* QR section */
    .ic-qr-section {
      background: linear-gradient(180deg, #0d2b5e 0%, #0a2056 100%);
      padding: 16px; display: flex; justify-content: center;
    }
    .ic-qr-frame {
      background: #ffffff; border-radius: 12px; padding: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,.5), 0 0 0 1px rgba(212,175,55,.45);
    }
    .ic-qr-frame canvas, .ic-qr-frame img { display: block; border-radius: 4px; }

    /* Name */
    .ic-name-section { background: #fff; padding: 14px 18px 6px; text-align: center; }
    .ic-fullname {
      font-family: var(--font-display); font-weight: 700;
      font-size: 1.22rem; color: #0d2b5e; line-height: 1.2;
    }
    .ic-nickname { color: #7b8aab; font-size: .84rem; margin-top: 3px; }

    /* Gen badge */
    .ic-gen-section { background: #fff; display: flex; justify-content: center; padding: 8px 0 4px; }
    .ic-gen-badge {
      background: linear-gradient(135deg, #f0c040, #e89800);
      color: #3a2500; font-weight: 700; font-size: .78rem;
      padding: 4px 16px; border-radius: 999px;
      box-shadow: 0 2px 8px rgba(240,192,64,.4);
      letter-spacing: .3px;
    }

    /* Reg ID */
    .ic-rid {
      background: #fff; text-align: center;
      font-size: .6rem; color: #aab4cc;
      font-family: monospace; letter-spacing: 2px;
      padding: 6px 0;
    }

    /* Gold separator */
    .ic-sep {
      height: 1px; margin: 0;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,.5) 30%, rgba(212,175,55,.5) 70%, transparent);
    }

    /* Footer */
    .ic-footer {
      background: linear-gradient(135deg, #071840 0%, #0d2b5e 100%);
      padding: 10px 18px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .ic-footer-text { font-size: .64rem; color: rgba(255,255,255,.65); letter-spacing: .5px; }
    .ic-badge {
      border: 1px solid rgba(212,175,55,.5); color: #f0c040;
      font-size: .58rem; font-weight: 700; letter-spacing: 1.5px;
      padding: 3px 8px; border-radius: 4px;
      background: rgba(240,192,64,.08);
    }

    /* Actions */
    .modal-actions { display: flex; gap: 10px; width: 100%; max-width: 300px; margin-top: 14px; }

    /* Save success overlay */
    .save-overlay {
      position: fixed; inset: 0;
      background: rgba(5, 20, 60, .92);
      display: flex; align-items: center; justify-content: center;
      z-index: 2000;
      animation: fadeInOverlay .25s ease;
    }
    @keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }
    .save-overlay-box {
      text-align: center; color: #fff;
      animation: cardPop .4s cubic-bezier(.18,.89,.32,1.28);
    }
    .save-overlay-icon { font-size: 4.5rem; margin-bottom: 14px; }
    .save-overlay-title {
      font-size: 1.6rem; font-weight: 700;
      font-family: var(--font-display); margin: 0 0 8px;
    }
    .save-overlay-sub { font-size: .85rem; color: rgba(255,255,255,.65); }

    /* Misc */
    .hint { font-size: .8rem; color: var(--ink-soft); margin-top: -6px; margin-bottom: 12px; }
  </style>
</head>
<body class="app-bg">
  <div class="app-bar">
    <button class="navback" onclick="goBack()">‹</button>
    <img class="logo" data-logo alt="" />
    <div>
      <div class="title" data-event-name>ลงทะเบียนเข้างาน</div>
      <div class="subtitle">ลงทะเบียนเพื่อรับบัตรเข้างาน</div>
    </div>
  </div>

  <div class="container">
    <div id="loading" class="loading"><div class="spinner"></div>กำลังโหลด...</div>

    <!-- ลงทะเบียนแล้ว -->
    <div id="done-wrap" class="card gold-top center" style="display:none">
      <h2>คุณลงทะเบียนแล้ว ✅</h2>
      <p class="muted">แสดงบัตร QR ของคุณที่จุดลงทะเบียนเพื่อเข้างาน</p>
      <button class="btn btn-gold mt" onclick="openCard()">แสดงบัตร QR</button>
    </div>

    <!-- ฟอร์ม -->
    <div id="form-wrap" class="card gold-top" style="display:none">
      <h2>ลงทะเบียนเข้างาน</h2>
      <p class="hint">กรอกข้อมูลเพื่อรับบัตรเข้างาน (* จำเป็น)</p>

      <div class="row">
        <div class="field">
          <label>ชื่อ <span class="req">*</span></label>
          <input class="input" id="first_name" />
        </div>
        <div class="field">
          <label>นามสกุล <span class="req">*</span></label>
          <input class="input" id="last_name" />
        </div>
      </div>

      <div class="field">
        <label>ชื่อเล่น <span class="req">*</span></label>
        <input class="input" id="nickname" />
      </div>

      <div class="row">
        <div class="field">
          <label>เพศ <span class="req">*</span></label>
          <select id="gender">
            <option value="">— เลือก —</option>
            <option value="ชาย">ชาย</option>
            <option value="หญิง">หญิง</option>
            <option value="อื่นๆ">อื่นๆ</option>
          </select>
        </div>
        <div class="field">
          <label>อายุ <span class="req">*</span></label>
          <input class="input" id="age" type="number" inputmode="numeric" min="1" max="120" />
        </div>
      </div>

      <div class="field">
        <label>เบอร์โทร <span class="req">*</span></label>
        <input class="input" id="phone" type="tel" inputmode="tel" placeholder="08xxxxxxxx" />
      </div>

      <!-- ฟิลด์เสริม (โชว์เฉพาะที่เปิดใน settings) -->
      <div class="field opt" data-opt="generation" style="display:none">
        <label>รุ่น</label>
        <input class="input" id="generation" placeholder="เช่น 44" />
      </div>
      <div class="field opt" data-opt="province" style="display:none">
        <label>จังหวัด</label>
        <input class="input" id="province" />
      </div>
      <div class="field opt" data-opt="occupation" style="display:none">
        <label>อาชีพ</label>
        <input class="input" id="occupation" />
      </div>
      <div class="field opt" data-opt="organization" style="display:none">
        <label>หน่วยงาน/องค์กร</label>
        <input class="input" id="organization" />
      </div>
      <div class="field opt" data-opt="email" style="display:none">
        <label>อีเมล</label>
        <input class="input" id="email" type="email" />
      </div>
      <div class="field opt" data-opt="address" style="display:none">
        <label>ที่อยู่</label>
        <textarea id="address" rows="2"></textarea>
      </div>

      <button class="btn btn-primary mt" id="submitBtn" onclick="submitForm()">ลงทะเบียน</button>
    </div>
  </div>

  <!-- ===== ID Card Modal ===== -->
  <div class="modal" id="card-modal">
    <div class="card-wrap">

      <!-- Lanyard hook -->
      <div class="lanyard-hole"></div>

      <!-- Card -->
      <div class="idcard" id="idcard">

        <!-- Header -->
        <div class="ic-head">
          <div class="ic-top-shimmer"></div>
          <div class="ic-logo-row">
            <img id="card-logo" alt="" />
            <div>
              <div class="ic-event-name" id="card-event">งาน</div>
              <div class="ic-event-tag">Invitation Card</div>
            </div>
          </div>
        </div>

        <!-- QR Code -->
        <div class="ic-qr-section">
          <div class="ic-qr-frame">
            <div id="qrbox"></div>
          </div>
        </div>

        <!-- Name -->
        <div class="ic-name-section">
          <div class="ic-fullname" id="card-name">—</div>
          <div class="ic-nickname" id="card-nick"></div>
        </div>

        <!-- Generation -->
        <div class="ic-gen-section" id="card-gen-wrap" style="display:none">
          <span class="ic-gen-badge" id="card-gen"></span>
        </div>

        <!-- Reg ID -->
        <div class="ic-rid" id="card-rid"></div>

        <!-- Separator + Footer -->
        <div class="ic-sep"></div>
        <div class="ic-footer">
          <div class="ic-footer-text">แสดงบัตรนี้ที่จุดลงทะเบียน</div>
          <div class="ic-badge">ENTRY</div>
        </div>

      </div><!-- /idcard -->

      <div class="modal-actions">
        <button class="btn btn-gold" onclick="saveCard()">⬇ บันทึกรูป</button>
        <button class="btn btn-ghost" style="background:#fff" onclick="closeCard()">ปิด</button>
      </div>
    </div>
  </div>

  <!-- libs -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="../config.js"></script>
  <script src="../api.js"></script>
  <script>
    var profile, settings, current;

    function goBack() {
      if (typeof liff !== 'undefined' && liff.closeWindow) { try { liff.closeWindow(); return; } catch (e) {} }
      if (history.length > 1) history.back();
    }

    (async function boot() {
      try {
        await API.liffInit(true);
        profile = await API.getProfile();
        settings = await API.bootTheme();
      } catch (e) {
        API.qs('#loading').innerHTML = '❌ เปิดผ่านแอป LINE เท่านั้น<br><span class="muted">' + e.message + '</span>';
        return;
      }

      var r = await API.get('getRegistration', { line_user_id: profile.userId });
      API.qs('#loading').style.display = 'none';

      if (r.found) {
        current = r.registration;
        API.qs('#done-wrap').style.display = 'block';
      } else {
        API.qsa('.opt').forEach(function (el) {
          if (API.fieldOn(settings, el.getAttribute('data-opt'))) el.style.display = 'block';
        });
        if (profile && profile.displayName) API.qs('#nickname').value = profile.displayName;
        API.qs('#form-wrap').style.display = 'block';
      }
    })();

    function val(id) { var el = API.qs('#' + id); return el ? String(el.value || '').trim() : ''; }

    function submitForm() {
      var data = {
        line_user_id: profile.userId,
        first_name: val('first_name'),
        last_name: val('last_name'),
        nickname: val('nickname'),
        gender: val('gender'),
        age: val('age'),
        phone: val('phone'),
        generation: val('generation'),
        province: val('province'),
        occupation: val('occupation'),
        organization: val('organization'),
        email: val('email'),
        address: val('address')
      };

      if (!data.first_name || !data.last_name || !data.nickname) return API.toast('กรอกชื่อ–นามสกุล–ชื่อเล่นให้ครบ');
      if (!data.gender) return API.toast('เลือกเพศ');
      if (!data.age || Number(data.age) < 1) return API.toast('กรอกอายุ');
      if (!/^[0-9]{9,10}$/.test(data.phone.replace(/\D/g, ''))) return API.toast('เบอร์โทรไม่ถูกต้อง');

      var btn = API.qs('#submitBtn');
      btn.disabled = true; btn.textContent = 'กำลังลงทะเบียน...';

      API.post('register', data).then(function (res) {
        if (res.ok && res.registration) {
          current = res.registration;
          API.qs('#form-wrap').style.display = 'none';
          API.qs('#done-wrap').style.display = 'block';
          openCard();
        } else {
          API.toast(res.error || 'ลงทะเบียนไม่สำเร็จ');
          btn.disabled = false; btn.textContent = 'ลงทะเบียน';
        }
      }).catch(function (e) {
        API.toast(e.message);
        btn.disabled = false; btn.textContent = 'ลงทะเบียน';
      });
    }

    function openCard() {
      if (!current) return;
      API.qs('#card-event').textContent = settings.event_name || 'งาน';
      var logoEl = API.qs('#card-logo');
      if (settings.logo_url) {
        logoEl.src = API.driveImg(settings.logo_url);
        logoEl.style.display = '';
      } else {
        logoEl.style.display = 'none';
      }
      API.qs('#card-name').textContent = ((current.first_name || '') + ' ' + (current.last_name || '')).trim();
      API.qs('#card-nick').textContent = current.nickname ? '(' + current.nickname + ')' : '';

      if (current.generation) {
        API.qs('#card-gen-wrap').style.display = 'flex';
        API.qs('#card-gen').textContent = 'รุ่น ' + current.generation;
      } else {
        API.qs('#card-gen-wrap').style.display = 'none';
      }
      API.qs('#card-rid').textContent = 'ID: ' + current.reg_id;

      // QR code — ใช้สีดำเพื่อให้สแกนได้ชัดเจน (ตรงกับที่ส่งใน LINE)
      var box = API.qs('#qrbox');
      box.innerHTML = '';
      new QRCode(box, {
        text: String(current.reg_id).trim(),
        width: 180, height: 180,
        colorDark: '#000000', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });

      API.qs('#card-modal').classList.add('open');
    }

    function closeCard() { API.qs('#card-modal').classList.remove('open'); }

    function saveCard() {
      var card = API.qs('#idcard');
      html2canvas(card, { scale: 3, backgroundColor: null, useCORS: true }).then(function (canvas) {
        var a = document.createElement('a');
        a.href = canvas.toDataURL('image/png');
        a.download = 'บัตรลงทะเบียน_' + (current.reg_id || '') + '.png';
        a.click();
        showSaveSuccess();
      }).catch(function () { API.toast('บันทึกไม่สำเร็จ ลองแคปหน้าจอแทน', 'error'); });
    }

    function showSaveSuccess() {
      var overlay = document.createElement('div');
      overlay.className = 'save-overlay';
      overlay.innerHTML =
        '<div class="save-overlay-box">' +
        '<div class="save-overlay-icon">✅</div>' +
        '<div class="save-overlay-title">บันทึกสำเร็จ</div>' +
        '<div class="save-overlay-sub">บัตรถูกบันทึกลงอุปกรณ์แล้ว</div>' +
        '</div>';
      document.body.appendChild(overlay);
      setTimeout(function () {
        overlay.style.transition = 'opacity .35s ease';
        overlay.style.opacity = '0';
        setTimeout(function () {
          overlay.remove();
          closeCard();
        }, 380);
      }, 1500);
    }
  </script>
</body>
</html>
