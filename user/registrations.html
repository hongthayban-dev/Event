<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:,">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ลงทะเบียนเข้างาน</title>
  <link rel="stylesheet" href="../theme.css" />
  <style>
    /* ===== Splash Screen ===== */
    .splash {
      position: fixed; inset: 0;
      background: linear-gradient(155deg, #071840 0%, #132f6e 45%, #0d2b5e 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
      z-index: 999;
      transition: transform .55s cubic-bezier(.4,0,.2,1), opacity .55s ease;
    }
    .splash.out { transform: translateY(-100%); opacity: 0; pointer-events: none; }
    .splash-logo { width: 88px; height: 88px; object-fit: contain; border-radius: 14px;
      box-shadow: 0 8px 28px rgba(0,0,0,.5); filter: brightness(1.05); }
    .splash-name { font-family: var(--font-display); font-size: 1.35rem; color: #fff; font-weight: 700;
      text-align: center; padding: 0 24px; text-shadow: 0 2px 8px rgba(0,0,0,.35); }
    .splash-sub { font-size: .8rem; color: rgba(240,192,64,.85); letter-spacing: 2px; text-transform: uppercase; }
    .splash-spinner { width: 28px; height: 28px; border: 3px solid rgba(255,255,255,.2);
      border-top-color: rgba(240,192,64,.9); border-radius: 50%; animation: spin 1s linear infinite; }

    /* ===== Luxury Lanyard ID Card ===== */
    .modal {
      position: fixed; inset: 0;
      background: rgba(5, 15, 40, .88);
      display: none; align-items: center; justify-content: center;
      padding: 16px; z-index: 1000;
      -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    }
    .modal.open { display: flex; }

    .card-wrap { display: flex; flex-direction: column; align-items: center; }

    .lanyard-hole {
      width: 48px; height: 48px;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
      position: relative;
    }
    .lanyard-hole::before {
      content: ''; position: absolute; top: 4px; left: 50%; transform: translateX(-50%);
      width: 18px; height: 18px; border: 2.5px solid #d4af37; border-radius: 50%;
      background: rgba(212,175,55,.12); box-shadow: 0 0 8px rgba(212,175,55,.3);
    }
    .lanyard-hole::after {
      content: ''; display: block; width: 3px; height: 22px;
      background: linear-gradient(to bottom, #d4af37, rgba(212,175,55,0));
    }

    .idcard {
      width: 100%; max-width: 300px; border-radius: 20px; overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,.7), 0 0 0 1px rgba(212,175,55,.45), inset 0 1px 0 rgba(255,255,255,.12);
      animation: cardPop .42s cubic-bezier(.18,.89,.32,1.28);
    }
    @keyframes cardPop { from { transform: scale(.78) translateY(30px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

    .ic-head {
      background: linear-gradient(155deg, #071840 0%, #132f6e 45%, #0d2b5e 100%);
      padding: 18px 18px 16px; position: relative; overflow: hidden;
    }
    .ic-head::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 15% 60%, rgba(240,192,64,.07) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, rgba(255,255,255,.05) 0%, transparent 45%);
      pointer-events: none;
    }
    .ic-top-shimmer {
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent 0%, #d4af37 20%, #fff8d4 50%, #d4af37 80%, transparent 100%);
    }
    .ic-head::after {
      content: ''; position: absolute; top: 12px; right: 12px;
      width: 20px; height: 20px; border-top: 1.5px solid rgba(212,175,55,.55); border-right: 1.5px solid rgba(212,175,55,.55);
      border-radius: 0 5px 0 0;
    }
    .ic-logo-row { display: flex; align-items: center; gap: 10px; position: relative; z-index: 1; }
    .ic-logo-row img { width: 38px; height: 38px; object-fit: contain; filter: drop-shadow(0 2px 8px rgba(0,0,0,.45)) brightness(1.05); border-radius: 6px; flex-shrink: 0; }
    .ic-event-name { font-family: var(--font-display); font-weight: 700; font-size: .95rem; color: #ffffff; line-height: 1.3; text-shadow: 0 1px 4px rgba(0,0,0,.35); }
    .ic-event-tag { font-size: .58rem; color: #f0c040; letter-spacing: 2.5px; text-transform: uppercase; margin-top: 3px; font-weight: 500; }

    .ic-qr-section { background: linear-gradient(180deg, #0d2b5e 0%, #0a2056 100%); padding: 16px; display: flex; justify-content: center; }
    .ic-qr-frame { background: #ffffff; border-radius: 12px; padding: 10px; box-shadow: 0 4px 24px rgba(0,0,0,.5), 0 0 0 1px rgba(212,175,55,.45); }
    .ic-qr-frame canvas, .ic-qr-frame img { display: block; border-radius: 4px; }

    .ic-name-section { background: #fff; padding: 14px 18px 6px; text-align: center; }
    .ic-fullname { font-family: var(--font-display); font-weight: 700; font-size: 1.22rem; color: #0d2b5e; line-height: 1.2; }
    .ic-nickname { color: #7b8aab; font-size: .84rem; margin-top: 3px; }

    .ic-gen-section { background: #fff; display: flex; justify-content: center; padding: 8px 0 4px; }
    .ic-gen-badge { background: linear-gradient(135deg, #f0c040, #e89800); color: #3a2500; font-weight: 700; font-size: .78rem; padding: 4px 16px; border-radius: 999px; box-shadow: 0 2px 8px rgba(240,192,64,.4); letter-spacing: .3px; }

    .ic-rid { background: #fff; text-align: center; font-size: .6rem; color: #aab4cc; font-family: monospace; letter-spacing: 2px; padding: 6px 0; }

    .ic-sep { height: 1px; margin: 0; background: linear-gradient(90deg, transparent, rgba(212,175,55,.5) 30%, rgba(212,175,55,.5) 70%, transparent); }

    .ic-footer { background: linear-gradient(135deg, #071840 0%, #0d2b5e 100%); padding: 10px 18px; display: flex; justify-content: space-between; align-items: center; }
    .ic-footer-text { font-size: .64rem; color: rgba(255,255,255,.65); letter-spacing: .5px; }
    .ic-badge { border: 1px solid rgba(212,175,55,.5); color: #f0c040; font-size: .58rem; font-weight: 700; letter-spacing: 1.5px; padding: 3px 8px; border-radius: 4px; background: rgba(240,192,64,.08); }

    .modal-actions { display: flex; gap: 10px; width: 100%; max-width: 300px; margin-top: 14px; }

    /* Save image overlay */
    .save-overlay {
      position: fixed; inset: 0;
      background: rgba(5, 20, 60, .94);
      display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px;
      z-index: 2000; padding: 20px;
      animation: fadeInOverlay .25s ease;
    }
    @keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }
    .save-overlay-hint { font-size: 14px; color: rgba(255,255,255,.75); text-align: center; }
    .save-overlay-img { max-width: 85vw; max-height: 55vh; border-radius: 12px; border: 2px solid rgba(212,175,55,.6); display: block; }
    .save-overlay-close { background: transparent; border: 1px solid rgba(255,255,255,.35); color: #fff; padding: 10px 28px; border-radius: 7px; font-family: var(--font-body); font-size: 14px; cursor: pointer; }

    /* Misc */
    .hint { font-size: .8rem; color: var(--ink-soft); margin-top: -6px; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
    .ic-gen-section.hidden { display: none; }
    .btn-ghost-white { background: #fff; }
    .done-line-id { font-size: .72rem; color: #aab4cc; font-family: monospace; word-break: break-all; margin-top: 6px; }
    .line-profile-bar { display: flex; align-items: center; gap: 10px; background: #f0fff4; border: 1px solid #b2dfdb; border-radius: 10px; padding: 10px 14px; margin-bottom: 14px; }
    .line-profile-bar img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2px solid #00c300; flex-shrink: 0; }
    .line-profile-bar .lp-name { font-weight: 700; font-size: .95rem; color: #1a3d1a; line-height: 1.3; }
    .line-profile-bar .lp-id { font-size: .65rem; color: #aab4cc; font-family: monospace; word-break: break-all; }
  </style>
</head>
<body class="app-bg">

  <!-- ===== Splash ===== -->
  <div id="splash" class="splash">
    <img class="splash-logo" data-logo alt="" />
    <div class="splash-name" data-event-name>กำลังโหลด...</div>
    <div class="splash-sub">Registration</div>
    <div class="splash-spinner"></div>
  </div>

  <div class="app-bar">
    <button class="navback" onclick="goBack()">‹</button>
    <img class="logo" data-logo alt="" />
    <div>
      <div class="title" data-event-name>ลงทะเบียนเข้างาน</div>
      <div class="subtitle">ลงทะเบียนเพื่อรับบัตรเข้างาน</div>
    </div>
  </div>

  <div class="container">
    <div id="loading" class="loading"><div class="spinner"></div>กำลังโหลด...</div>

    <!-- ลงทะเบียนแล้ว -->
    <div id="done-wrap" class="card gold-top center hidden">
      <h2>คุณลงทะเบียนแล้ว ✅</h2>
      <p class="muted">แสดงบัตร QR ของคุณที่จุดลงทะเบียนเพื่อเข้างาน</p>
      <div id="done-line-id" class="line-profile-bar hidden"></div>
      <button type="button" class="btn btn-gold mt" onclick="openCard()">แสดงบัตร QR</button>
    </div>

    <!-- ฟอร์ม -->
    <div id="form-wrap" class="card gold-top hidden">
      <h2>ลงทะเบียนเข้างาน</h2>
      <p class="hint">กรอกข้อมูลเพื่อรับบัตรเข้างาน (* จำเป็น)</p>
      <div id="form-line-id" class="line-profile-bar hidden"></div>

      <div class="row">
        <div class="field">
          <label>ชื่อ <span class="req">*</span></label>
          <input class="input" id="first_name" />
        </div>
        <div class="field">
          <label>นามสกุล <span class="req">*</span></label>
          <input class="input" id="last_name" />
        </div>
      </div>

      <div class="field">
        <label>ชื่อเล่น <span class="req">*</span></label>
        <input class="input" id="nickname" />
      </div>

      <div class="row">
        <div class="field">
          <label>เพศ <span class="req">*</span></label>
          <select id="gender">
            <option value="">— เลือก —</option>
            <option value="ชาย">ชาย</option>
            <option value="หญิง">หญิง</option>
            <option value="อื่นๆ">อื่นๆ</option>
          </select>
        </div>
        <div class="field">
          <label>อายุ <span class="req">*</span></label>
          <input class="input" id="age" type="number" inputmode="numeric" min="1" max="120" />
        </div>
      </div>

      <div class="field">
        <label>เบอร์โทร <span class="req">*</span></label>
        <input class="input" id="phone" type="tel" inputmode="tel" placeholder="08xxxxxxxx" />
      </div>

      <!-- ฟิลด์เสริม (โชว์เฉพาะที่เปิดใน settings) -->
      <div class="field opt hidden" data-opt="generation">
        <label>รุ่น</label>
        <input class="input" id="generation" placeholder="เช่น 44" />
      </div>
      <div class="field opt hidden" data-opt="occupation">
        <label>อาชีพ</label>
        <input class="input" id="occupation" />
      </div>
      <div class="field opt hidden" data-opt="organization">
        <label>หน่วยงาน/องค์กร</label>
        <input class="input" id="organization" />
      </div>
      <div class="field opt hidden" data-opt="email">
        <label>อีเมล</label>
        <input class="input" id="email" type="email" />
      </div>
      <div class="field opt hidden" data-opt="address">
        <label>ที่อยู่</label>
        <textarea id="address" rows="2"></textarea>
      </div>

      <!-- Province + District (แสดงตามที่เปิด, อยู่ล่างสุด) -->
      <div class="field opt hidden" data-opt="province">
        <label>จังหวัด</label>
        <select id="province" onchange="onProvinceChange()">
          <option value="">— เลือกจังหวัด —</option>
        </select>
      </div>
      <div id="district-fields" class="hidden">
        <div class="field">
          <label>อำเภอ/เขต</label>
          <select id="district" onchange="onDistrictChange()" disabled>
            <option value="">— เลือกอำเภอ —</option>
          </select>
        </div>
        <div class="field">
          <label>ตำบล/แขวง</label>
          <select id="subdistrict" onchange="onSubdistrictChange()" disabled>
            <option value="">— เลือกตำบล —</option>
          </select>
        </div>
        <div class="field">
          <label>รหัสไปรษณีย์</label>
          <input class="input" id="postal_code" type="text" readonly placeholder="อัตโนมัติ" />
        </div>
      </div>

      <button type="button" class="btn btn-primary mt" id="submitBtn" onclick="submitForm()">ลงทะเบียน</button>
    </div>
  </div>

  <!-- ===== ID Card Modal ===== -->
  <div class="modal" id="card-modal">
    <div class="card-wrap">
      <div class="lanyard-hole"></div>
      <div class="idcard" id="idcard">
        <div class="ic-head">
          <div class="ic-top-shimmer"></div>
          <div class="ic-logo-row">
            <img id="card-logo" alt="" />
            <div>
              <div class="ic-event-name" id="card-event">งาน</div>
              <div class="ic-event-tag">Invitation Card</div>
            </div>
          </div>
        </div>
        <div class="ic-qr-section">
          <div class="ic-qr-frame">
            <div id="qrbox"></div>
          </div>
        </div>
        <div class="ic-name-section">
          <div class="ic-fullname" id="card-name">—</div>
          <div class="ic-nickname" id="card-nick"></div>
        </div>
        <div class="ic-gen-section hidden" id="card-gen-wrap">
          <span class="ic-gen-badge" id="card-gen"></span>
        </div>
        <div class="ic-rid" id="card-rid"></div>
        <div class="ic-sep"></div>
        <div class="ic-footer">
          <div class="ic-footer-text">แสดงบัตรนี้ที่จุดลงทะเบียน</div>
          <div class="ic-badge">ENTRY</div>
        </div>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn btn-gold" onclick="saveCard()">⬇ บันทึกรูป</button>
        <button type="button" class="btn btn-ghost btn-ghost-white" onclick="closeCard()">ปิด</button>
      </div>
    </div>
  </div>

  <!-- libs -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="../config.js"></script>
  <script src="../api.js"></script>
  <script>
    var profile, settings, current;
    var locationData = null;

    function goBack() {
      if (typeof liff !== 'undefined' && liff.closeWindow) { try { liff.closeWindow(); return; } catch (e) {} }
      if (history.length > 1) history.back();
    }

    function hideSplash() {
      var el = document.getElementById('splash');
      if (!el) return;
      el.classList.add('out');
      setTimeout(function() { el.remove(); }, 600);
    }

    (async function boot() {
      try {
        await API.liffInit(true);
        profile = await API.getProfile().catch(function() { return null; });
        settings = await API.bootTheme();
      } catch (e) {
        hideSplash();
        API.qs('#loading').innerHTML = '❌ เปิดผ่านแอป LINE เท่านั้น<br><span class="muted">' + e.message + '</span>';
        return;
      }

      hideSplash();

      var r = await API.get('getRegistration', { line_user_id: profile ? profile.userId : '' });
      API.qs('#loading').classList.add('hidden');

      if (profile && profile.userId) {
        var barHTML = '<img src="' + (profile.pictureUrl || '') + '" alt="">' +
          '<div><div class="lp-name">' + (profile.displayName || '') + '</div></div>';
        ['#done-line-id', '#form-line-id'].forEach(function(sel) {
          var el = API.qs(sel);
          if (el) { el.innerHTML = barHTML; el.classList.remove('hidden'); }
        });
      }

      if (r.found) {
        current = r.registration;
        API.qs('#done-wrap').classList.remove('hidden');
      } else {
        API.qsa('.opt').forEach(function (el) {
          var key = el.getAttribute('data-opt');
          if (API.fieldOn(settings, key)) {
            el.classList.remove('hidden');
            if (key === 'province') {
              document.getElementById('district-fields').classList.remove('hidden');
              loadLocationData();
            }
          }
        });
        if (profile && profile.displayName) API.qs('#nickname').value = profile.displayName;
        API.qs('#form-wrap').classList.remove('hidden');
      }
    })();

    function val(id) { var el = API.qs('#' + id); return el ? String(el.value || '').trim() : ''; }

    // ── Location data ──────────────────────────────────────────
    async function loadLocationData() {
      if (locationData) return;
      try {
        var res = await API.get('getLocationData');
        locationData = res.data || [];
        var provinces = [];
        locationData.forEach(function(r) { if (r.province && provinces.indexOf(r.province) < 0) provinces.push(r.province); });
        provinces.sort();
        var sel = document.getElementById('province');
        provinces.forEach(function(p) {
          var opt = document.createElement('option');
          opt.value = p; opt.textContent = p;
          sel.appendChild(opt);
        });
      } catch (e) { /* silently ignore, province stays as text if API fails */ }
    }

    function onProvinceChange() {
      var prov = val('province');
      var distSel = document.getElementById('district');
      var subSel  = document.getElementById('subdistrict');
      distSel.innerHTML = '<option value="">— เลือกอำเภอ —</option>';
      subSel.innerHTML  = '<option value="">— เลือกตำบล —</option>';
      document.getElementById('postal_code').value = '';
      distSel.disabled = true; subSel.disabled = true;
      if (!prov || !locationData) return;
      var districts = [];
      locationData.forEach(function(r) { if (r.province === prov && r.district && districts.indexOf(r.district) < 0) districts.push(r.district); });
      districts.sort();
      districts.forEach(function(d) {
        var opt = document.createElement('option'); opt.value = d; opt.textContent = d; distSel.appendChild(opt);
      });
      distSel.disabled = false;
    }

    function onDistrictChange() {
      var prov = val('province');
      var dist = val('district');
      var subSel = document.getElementById('subdistrict');
      subSel.innerHTML = '<option value="">— เลือกตำบล —</option>';
      document.getElementById('postal_code').value = '';
      subSel.disabled = true;
      if (!prov || !dist || !locationData) return;
      var filtered = locationData.filter(function(r) { return r.province === prov && r.district === dist; });
      var subs = [];
      filtered.forEach(function(r) { if (r.subdistrict && subs.indexOf(r.subdistrict) < 0) subs.push(r.subdistrict); });
      subs.sort();
      subs.forEach(function(s) {
        var opt = document.createElement('option'); opt.value = s; opt.textContent = s; subSel.appendChild(opt);
      });
      subSel.disabled = false;
    }

    function onSubdistrictChange() {
      var prov = val('province');
      var dist = val('district');
      var sub  = val('subdistrict');
      if (!sub || !locationData) return;
      var match = null;
      for (var i = 0; i < locationData.length; i++) {
        if (locationData[i].province === prov && locationData[i].district === dist && locationData[i].subdistrict === sub) {
          match = locationData[i]; break;
        }
      }
      if (match) document.getElementById('postal_code').value = match.postal_code || '';
    }

    // ── Submit ──────────────────────────────────────────────────
    function submitForm() {
      var data = {
        line_user_id:  profile ? profile.userId : '',
        first_name:    val('first_name'),
        last_name:     val('last_name'),
        nickname:      val('nickname'),
        gender:        val('gender'),
        age:           val('age'),
        phone:         val('phone'),
        generation:    val('generation'),
        occupation:    val('occupation'),
        organization:  val('organization'),
        email:         val('email'),
        address:       val('address'),
        province:      val('province'),
        district:      val('district'),
        subdistrict:   val('subdistrict'),
        postal_code:   val('postal_code')
      };

      if (!data.first_name || !data.last_name || !data.nickname) return API.toast('กรอกชื่อ–นามสกุล–ชื่อเล่นให้ครบ');
      if (!data.gender) return API.toast('เลือกเพศ');
      if (!data.age || Number(data.age) < 1) return API.toast('กรอกอายุ');
      if (!/^[0-9]{9,10}$/.test(data.phone.replace(/\D/g, ''))) return API.toast('เบอร์โทรไม่ถูกต้อง');

      var btn = API.qs('#submitBtn');
      btn.disabled = true; btn.textContent = 'กำลังลงทะเบียน...';

      API.post('register', data).then(function (res) {
        if (res.ok && res.registration) {
          current = res.registration;
          API.qs('#form-wrap').classList.add('hidden');
          API.qs('#done-wrap').classList.remove('hidden');
          openCard();
        } else {
          API.toast(res.error || 'ลงทะเบียนไม่สำเร็จ');
          btn.disabled = false; btn.textContent = 'ลงทะเบียน';
        }
      }).catch(function (e) {
        API.toast(e.message);
        btn.disabled = false; btn.textContent = 'ลงทะเบียน';
      });
    }

    // ── ID Card ─────────────────────────────────────────────────
    function openCard() {
      if (!current) return;
      API.qs('#card-event').textContent = settings.event_name || 'งาน';
      var logoEl = API.qs('#card-logo');
      if (settings.logo_url) { logoEl.src = API.driveImg(settings.logo_url); logoEl.style.display = ''; }
      else { logoEl.style.display = 'none'; }
      API.qs('#card-name').textContent = ((current.first_name || '') + ' ' + (current.last_name || '')).trim();
      API.qs('#card-nick').textContent = current.nickname ? '(' + current.nickname + ')' : '';
      if (current.generation) {
        API.qs('#card-gen-wrap').classList.remove('hidden');
        API.qs('#card-gen').textContent = 'รุ่น ' + current.generation;
      } else {
        API.qs('#card-gen-wrap').classList.add('hidden');
      }
      API.qs('#card-rid').textContent = 'ID: ' + current.reg_id;
      var box = API.qs('#qrbox');
      box.innerHTML = '';
      new QRCode(box, {
        text: String(current.reg_id).trim(),
        width: 180, height: 180,
        colorDark: '#000000', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
      API.qs('#card-modal').classList.add('open');
    }

    function closeCard() { API.qs('#card-modal').classList.remove('open'); }

    function saveCard() {
      var card = API.qs('#idcard');
      html2canvas(card, { scale: 3, backgroundColor: null, useCORS: true, logging: false }).then(function (canvas) {
        var dataUrl = canvas.toDataURL('image/png');

        // Try programmatic download
        try {
          var a = document.createElement('a');
          a.href = dataUrl;
          a.download = 'บัตรลงทะเบียน_' + (current.reg_id || '') + '.png';
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
        } catch (e) {}

        // Show full-screen image overlay so mobile/LINE users can long-press to save
        var overlay = document.createElement('div');
        overlay.className = 'save-overlay';
        var img = document.createElement('img');
        img.className = 'save-overlay-img';
        img.src = dataUrl;
        var hint = document.createElement('div');
        hint.className = 'save-overlay-hint';
        hint.textContent = 'กดค้างที่รูปเพื่อบันทึกลงอุปกรณ์';
        var closeBtn = document.createElement('button');
        closeBtn.className = 'save-overlay-close';
        closeBtn.textContent = 'ปิด';
        closeBtn.onclick = function() { overlay.remove(); };
        overlay.appendChild(hint);
        overlay.appendChild(img);
        overlay.appendChild(closeBtn);
        document.body.appendChild(overlay);
      }).catch(function () { API.toast('บันทึกไม่สำเร็จ ลองแคปหน้าจอแทน', 'error'); });
    }
  </script>
</body>
</html>
