<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>วงล้อจับรางวัล</title>
  <link rel="stylesheet" href="../theme.css" />
  <style>
    html, body { height: 100%; overflow: hidden; }
    body {
      background:
        radial-gradient(900px 600px at 50% -10%, rgba(240,192,64,.18), transparent 60%),
        var(--navy-grad);
      color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center;
      position: relative;
    }
    .navback-fixed {
      position: fixed; top: 16px; left: 16px; z-index: 60;
      background: rgba(255,255,255,.16); border: none; color: #fff; width: 42px; height: 42px;
      border-radius: 12px; font-size: 1.5rem; cursor: pointer;
    }
    .navback-fixed:active { background: rgba(255,255,255,.32); }
    .ev-title { font-family: var(--font-display); font-weight: 700; font-size: clamp(1.4rem, 4vw, 2.6rem); text-align: center; margin-bottom: 4px; text-shadow: 0 2px 10px rgba(0,0,0,.4); }
    .ev-sub { color: var(--accent); letter-spacing: 3px; font-size: clamp(.7rem,1.5vw,1rem); margin-bottom: 18px; text-transform: uppercase; }

    .stage { position: relative; width: min(78vmin, 560px); height: min(78vmin, 560px); }
    .pointer {
      position: absolute; top: -6px; left: 50%; transform: translateX(-50%); z-index: 5;
      width: 0; height: 0; border-left: 22px solid transparent; border-right: 22px solid transparent;
      border-top: 38px solid var(--accent); filter: drop-shadow(0 3px 4px rgba(0,0,0,.5));
    }
    #wheelWrap {
      width: 100%; height: 100%; border-radius: 50%;
      box-shadow: 0 0 0 10px rgba(255,255,255,.9), 0 0 0 16px var(--accent-600), 0 20px 60px rgba(0,0,0,.5);
      will-change: transform;
    }
    #wheelWrap svg { display: block; width: 100%; height: 100%; }
    .hub {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 4;
      width: 16%; height: 16%; border-radius: 50%; background: var(--gold-grad);
      box-shadow: 0 4px 14px rgba(0,0,0,.4), inset 0 2px 4px rgba(255,255,255,.5);
      display: flex; align-items: center; justify-content: center; font-size: 1.6rem;
    }
    .idle-spin { animation: idleSpin 22s linear infinite; }
    @keyframes idleSpin { to { transform: rotate(360deg); } }
    .status { margin-top: 22px; font-size: clamp(1rem,2.5vw,1.5rem); color: var(--accent); font-weight: 600; min-height: 1.4em; text-align: center; }

    /* reveal overlay */
    #reveal {
      position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(7,17,38,.92); z-index: 50; padding: 24px; text-align: center;
    }
    #reveal.open { display: flex; animation: fadein .3s; }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    #reveal .label { color: var(--accent); letter-spacing: 4px; font-size: clamp(1rem,3vw,1.6rem); margin-bottom: 6px; }
    #reveal .reward { color: #fff; font-size: clamp(1.1rem,2.6vw,1.6rem); margin-bottom: 22px; opacity: .9; }
    #reveal .winners { display: flex; flex-direction: column; gap: 14px; align-items: center; max-height: 60vh; overflow-y: auto; }
    #reveal .wname {
      font-family: var(--font-display); font-weight: 700; color: #fff;
      font-size: clamp(1.8rem, 6vw, 4rem); line-height: 1.1;
      background: linear-gradient(180deg,#fff,#ffe9a8); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      animation: pop .5s cubic-bezier(.2,.8,.3,1.3) both;
    }
    @keyframes pop { from { transform: scale(.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .confetti { position: fixed; top: -10px; width: 10px; height: 14px; z-index: 49; pointer-events: none; }

    /* start (เปิดเสียง) */
    #startScreen {
      position: fixed; inset: 0; z-index: 80; display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: var(--navy-grad); text-align: center; padding: 24px;
    }
    #startScreen.hide { display: none; }
  </style>
</head>
<body>
  <button class="navback-fixed" onclick="goBack()">‹</button>
  <div class="ev-title" data-event-name>วงล้อจับรางวัล</div>
  <div class="ev-sub">LUCKY DRAW</div>

  <div class="stage">
    <div class="pointer"></div>
    <div id="wheelWrap"></div>
    <div class="hub">🎁</div>
  </div>
  <div class="status" id="status">พร้อมจับรางวัล</div>

  <div id="reveal">
    <div class="label">🏆 ผู้โชคดี</div>
    <div class="reward" id="revReward"></div>
    <div class="winners" id="revWinners"></div>
  </div>

  <!-- หน้าจอเริ่ม (แตะเพื่อเปิดเสียง) -->
  <div id="startScreen">
    <div class="ev-title" data-event-name style="margin-bottom:18px">วงล้อจับรางวัล</div>
    <button class="btn btn-gold" style="max-width:320px;font-size:1.2rem;padding:20px" onclick="startDisplay()">▶ แตะเพื่อเริ่ม (เปิดเสียง)</button>
    <p style="color:var(--accent);margin-top:18px;font-size:.9rem">เปิดบนจอใหญ่ แล้วแตะ 1 ครั้งเพื่ออนุญาตเสียง</p>
  </div>

  <audio id="fanfare" src="../Fanfare_For_Winner.mp3" preload="auto"></audio>

  <script src="../config.js"></script>
  <script src="../api.js"></script>
  <script>
    var WA = '#b71c1c', WB = '#fafafa', TA = '#ffffff', TB = '#1a1a1a';
    var currentRotation = 0, lastRound = -1, lastStatus = '', busy = false;
    var audioCtx = null, soundOn = false, started = false;

    function goBack() { location.href = 'remote.html'; }

    (async function () {
      var s = await API.bootTheme().catch(function () { return {}; });
      WA = s.wheel_color_a || WA; WB = s.wheel_color_b || WB;
      TA = s.wheel_text_a || TA; TB = s.wheel_text_b || TB;
      showIdle();
    })();

    // เริ่มจอ + ปลดล็อกเสียง (ต้องมาจากการแตะของผู้ใช้)
    function startDisplay() {
      if (started) return;
      started = true;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        var f = document.getElementById('fanfare');
        f.muted = true; f.play().then(function () { f.pause(); f.currentTime = 0; f.muted = false; soundOn = true; }).catch(function () { soundOn = true; });
        soundOn = true;
      } catch (e) { soundOn = false; }
      API.qs('#startScreen').classList.add('hide');
      poll();
      setInterval(poll, 1500);
    }

    // ---------- เสียง ----------
    function tick() {
      if (!audioCtx) return;
      var o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = 'square'; o.frequency.value = 880;
      g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.18, audioCtx.currentTime + 0.004);
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.05);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + 0.06);
    }
    function playSpinTicks() {
      if (!audioCtx) return;
      var N = 46, dur = 5000;
      for (var k = 0; k < N; k++) {
        var frac = k / N;
        var t = dur * (1 - Math.pow(1 - frac, 2.3)); // ติ๊กถี่ตอนต้น แล้วค่อย ๆ ห่างออก
        setTimeout(tick, t);
      }
    }
    function playFanfare() {
      if (!soundOn) return;
      var f = document.getElementById('fanfare');
      try { f.currentTime = 0; f.play(); } catch (e) {}
    }

    // ---------- วงล้อ ----------
    function pointAt(angle, radius) {
      var rad = angle * Math.PI / 180;
      return { x: 200 + radius * Math.sin(rad), y: 200 - radius * Math.cos(rad) };
    }
    function escapeHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    function buildWheel(segs) {
      var n = segs.length || 1;
      var seg = 360 / n;
      var fontSize = n <= 8 ? 17 : (n <= 12 ? 14 : 12);
      var svg = '<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">';
      for (var i = 0; i < n; i++) {
        var a0 = i * seg, a1 = (i + 1) * seg;
        var p0 = pointAt(a0, 198), p1 = pointAt(a1, 198);
        var large = seg > 180 ? 1 : 0;
        var fill = (i % 2 === 0) ? WA : WB;
        svg += '<path d="M200,200 L' + p0.x.toFixed(2) + ',' + p0.y.toFixed(2) +
               ' A198,198 0 ' + large + ' 1 ' + p1.x.toFixed(2) + ',' + p1.y.toFixed(2) + ' Z" fill="' + fill + '" stroke="rgba(0,0,0,.08)" stroke-width="1"/>';
        var am = a0 + seg / 2;
        var tp = pointAt(am, 122);
        var rot = am; if (am > 90 && am < 270) rot = am + 180;
        var col = (i % 2 === 0) ? TA : TB;
        var name = String(segs[i].name || '');
        if (name.length > 12) name = name.slice(0, 11) + '…';
        svg += '<text x="' + tp.x.toFixed(1) + '" y="' + tp.y.toFixed(1) + '" fill="' + col +
               '" font-family="Sarabun, sans-serif" font-size="' + fontSize + '" font-weight="600" text-anchor="middle" dominant-baseline="middle" transform="rotate(' + rot.toFixed(1) + ',' + tp.x.toFixed(1) + ',' + tp.y.toFixed(1) + ')">' + escapeHtml(name) + '</text>';
      }
      svg += '</svg>';
      return svg;
    }

    function showIdle() {
      var deco = [];
      for (var i = 0; i < 12; i++) deco.push({ name: '🎁' });
      var wrap = API.qs('#wheelWrap');
      wrap.style.transition = 'none';
      wrap.style.transform = 'rotate(0deg)';
      currentRotation = 0;
      wrap.innerHTML = buildWheel(deco);
      wrap.classList.add('idle-spin');
      API.qs('#status').textContent = 'พร้อมจับรางวัล';
      closeReveal();
    }

    function spinTo(winnerIndex, n) {
      var wrap = API.qs('#wheelWrap');
      wrap.classList.remove('idle-spin');
      var seg = 360 / n;
      var center = winnerIndex * seg + seg / 2;
      var base = currentRotation - (currentRotation % 360);
      var target = base + 360 * 6 + (360 - center);
      currentRotation = target;
      void wrap.offsetWidth;
      wrap.style.transition = 'transform 5s cubic-bezier(.12,.84,.28,1)';
      wrap.style.transform = 'rotate(' + target + 'deg)';
    }

    function handleSpin(state) {
      if (busy) return;
      busy = true;
      closeReveal();
      var pool = state.pool && state.pool.length ? state.pool : (state.winners || []).map(function (w) { return { id: w.reg_id, name: w.nickname || w.first_name }; });
      var n = pool.length || 1;
      var wrap = API.qs('#wheelWrap');
      wrap.classList.remove('idle-spin');
      wrap.style.transition = 'none';
      wrap.style.transform = 'rotate(' + (currentRotation % 360) + 'deg)';
      currentRotation = currentRotation % 360;
      wrap.innerHTML = buildWheel(pool);

      var winId = (state.winners && state.winners[0]) ? state.winners[0].reg_id : null;
      var idx = 0;
      for (var i = 0; i < pool.length; i++) { if (String(pool[i].id) === String(winId)) { idx = i; break; } }

      API.qs('#status').textContent = 'กำลังจับรางวัล...';
      setTimeout(function () { spinTo(idx, n); playSpinTicks(); }, 60);
      setTimeout(function () { showReveal(state); busy = false; }, 5400);
    }

    function showReveal(state) {
      var rewardLabel = state.reward_name || state.reward_value || '';
      API.qs('#revReward').textContent = rewardLabel ? ('รางวัล: ' + rewardLabel) : '';
      var box = API.qs('#revWinners');
      box.innerHTML = '';
      (state.winners || []).forEach(function (w, k) {
        var d = document.createElement('div');
        d.className = 'wname';
        d.style.animationDelay = (k * 0.15) + 's';
        d.textContent = (w.first_name || '') + ' ' + (w.last_name || '') + (w.nickname ? ' (' + w.nickname + ')' : '');
        box.appendChild(d);
      });
      API.qs('#reveal').classList.add('open');
      API.qs('#status').textContent = '🎉 ยินดีด้วย!';
      playFanfare();
      confetti();
    }

    function closeReveal() { API.qs('#reveal').classList.remove('open'); }

    function confetti() {
      var colors = ['#f0c040', '#ffffff', '#2f5aa0', '#d9a521', '#ffe9a8'];
      for (var i = 0; i < 60; i++) {
        (function () {
          var c = document.createElement('div');
          c.className = 'confetti';
          c.style.left = Math.random() * 100 + 'vw';
          c.style.background = colors[Math.floor(Math.random() * colors.length)];
          c.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
          var dur = 2.5 + Math.random() * 2;
          c.style.transition = 'top ' + dur + 's linear, opacity ' + dur + 's linear';
          document.body.appendChild(c);
          requestAnimationFrame(function () { c.style.top = (100 + Math.random() * 20) + 'vh'; c.style.opacity = '0'; });
          setTimeout(function () { c.remove(); }, dur * 1000 + 200);
        })();
      }
    }

    async function poll() {
      var res = await API.get('getWheelState').catch(function () { return null; });
      if (!res || !res.ok) return;
      var st = res.state || {};

      if (lastRound < 0) {
        lastRound = st.round || 0;
        lastStatus = st.status || 'idle';
        if (st.status === 'spinning' && st.winners) showReveal(st);
        else showIdle();
        return;
      }
      if ((st.round || 0) > lastRound && st.status === 'spinning') {
        lastRound = st.round;
        handleSpin(st);
      } else if (st.status === 'idle' && lastStatus !== 'idle') {
        showIdle();
      }
      lastStatus = st.status || 'idle';
    }
  </script>
</body>
</html>
