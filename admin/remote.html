<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>รีโมทจับรางวัล</title>
  <link rel="stylesheet" href="../theme.css" />
  <style>
    .summary { background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 14px; font-size: .9rem; }
    .summary b { color: var(--ink); }
    .summary .count { color: var(--accent-600); font-weight: 700; }
    .panel { display: none; }
    .panel.open { display: block; }
    .mode-toggle { display: flex; gap: 8px; }
    .mode-toggle button {
      flex: 1; padding: 12px; border: 1.5px solid var(--line); background: #fff; border-radius: var(--radius-sm);
      font-family: var(--font-body); font-weight: 600; color: var(--ink-soft); cursor: pointer;
    }
    .mode-toggle button.active { background: var(--navy-grad); color: #fff; border-color: transparent; }
    .switch-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px; border: 1.5px solid var(--line); border-radius: var(--radius-sm); margin-bottom: 12px; }
    .switch-row .lbl { font-weight: 600; font-size: .92rem; }
    .switch-row .sub { font-size: .76rem; color: var(--ink-soft); }
    .sw { position: relative; width: 52px; height: 30px; flex-shrink: 0; }
    .sw input { display: none; }
    .sw .track { position: absolute; inset: 0; background: var(--line); border-radius: 999px; transition: .2s; }
    .sw .track::after { content: ''; position: absolute; top: 3px; left: 3px; width: 24px; height: 24px; background: #fff; border-radius: 50%; transition: .2s; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
    .sw input:checked + .track { background: var(--ok); }
    .sw input:checked + .track::after { transform: translateX(22px); }
    .spin-btn { font-size: 1.4rem !important; padding: 22px !important; }
    .winner-row { padding: 10px 12px; border: 1px solid var(--line); border-radius: var(--radius-sm); margin-bottom: 8px; }
    .winner-row .nm { font-weight: 700; font-family: var(--font-display); font-size: 1.1rem; }
  </style>
</head>
<body class="app-bg">
  <div class="app-bar">
    <button class="navback" onclick="goBack()">‹</button>
    <img class="logo" data-logo alt="" />
    <div>
      <div class="title">รีโมทจับรางวัล</div>
      <div class="subtitle">ADMIN · REMOTE</div>
    </div>
  </div>

  <div class="container">
    <div id="loading" class="loading"><div class="spinner"></div>กำลังโหลด...</div>

    <div id="app" style="display:none">
      <!-- การ์ดควบคุมหลัก -->
      <div class="card gold-top">
        <div class="summary" id="summary"></div>
        <button class="btn btn-ghost" style="background:#fff;margin-bottom:14px" onclick="togglePanel()">⚙️ ตั้งค่าการจับ</button>
        <button class="btn btn-gold spin-btn" id="spinBtn" onclick="spin()">🎉 หมุนวงล้อ</button>
      </div>

      <!-- แผงตั้งค่า (ซ่อนไว้) -->
      <div class="card panel" id="panel">
        <h2>ตั้งค่าการจับ</h2>

        <div class="row">
          <div class="field">
            <label>เพศ</label>
            <select id="f_gender" onchange="onChange()">
              <option value="">ทั้งหมด</option>
              <option value="ชาย">ชาย</option>
              <option value="หญิง">หญิง</option>
              <option value="อื่นๆ">อื่นๆ</option>
            </select>
          </div>
          <div class="field">
            <label>รุ่น</label>
            <input class="input" id="f_gen" placeholder="ว่าง = ทุกรุ่น" oninput="onChange()" />
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>อายุต่ำสุด</label>
            <input class="input" id="f_amin" type="number" inputmode="numeric" placeholder="-" oninput="onChange()" />
          </div>
          <div class="field">
            <label>อายุสูงสุด</label>
            <input class="input" id="f_amax" type="number" inputmode="numeric" placeholder="-" oninput="onChange()" />
          </div>
        </div>

        <div class="switch-row">
          <div>
            <div class="lbl">กันคนที่เคยถูกรางวัล</div>
            <div class="sub">เปิด = คนที่ถูกแล้วจะไม่ถูกซ้ำ</div>
          </div>
          <label class="sw">
            <input type="checkbox" id="f_excl" checked onchange="onChange()" />
            <span class="track"></span>
          </label>
        </div>

        <div class="field">
          <label>ของรางวัล</label>
          <select id="reward" onchange="onChange()"></select>
        </div>

        <label style="display:block;font-size:.85rem;font-weight:600;color:var(--ink-soft);margin-bottom:6px">โหมดการจับ</label>
        <div class="mode-toggle">
          <button id="m-one" class="active" onclick="setMode('one')">ทีละคน</button>
          <button id="m-multi" onclick="setMode('multi')">หลายคนพร้อมกัน</button>
        </div>

        <div class="field mt" id="countWrap" style="display:none">
          <label>จำนวนผู้ชนะต่อการหมุน 1 ครั้ง</label>
          <input class="input" id="count" type="number" inputmode="numeric" value="3" min="1" max="16" oninput="onChange()" />
        </div>

        <button class="btn btn-primary mt" onclick="togglePanel()">เสร็จ</button>
      </div>

      <!-- ปุ่มรอง -->
      <div class="row mt">
        <button class="btn btn-ghost btn-sm" style="background:#fff" onclick="resetWheel()">↺ ล้างจอ</button>
        <button class="btn btn-ghost btn-sm" style="background:#fff" onclick="openDisplay()">🖥️ เปิดจอวงล้อ</button>
      </div>

      <!-- ผลล่าสุด -->
      <div id="result" class="card" style="display:none"></div>
    </div>
  </div>

  <script src="../config.js"></script>
  <script src="../api.js"></script>
  <script>
    var session, mode = 'one', rewards = [], countTimer;

    function goBack() { location.href = '../staff/index.html'; }

    (async function () {
      session = API.getSession();
      if (!session || !session.username) { location.href = '../staff/index.html'; return; }
      await API.bootTheme().catch(function () {});
      var rw = await API.get('getRewards');
      rewards = (rw.rewards || []);
      var sel = API.qs('#reward');
      sel.innerHTML = '<option value="">— ไม่ระบุของรางวัล —</option>';
      rewards.forEach(function (r, i) {
        var label = (r.name || '') + (r.value ? ' (' + r.value + ')' : '') + (r.quantity ? ' · เหลือ ' + r.quantity : '');
        sel.innerHTML += '<option value="' + i + '">' + label + '</option>';
      });
      API.qs('#loading').style.display = 'none';
      API.qs('#app').style.display = 'block';
      onChange();
    })();

    function togglePanel() {
      API.qs('#panel').classList.toggle('open');
      renderSummary();
    }

    function getFilters() {
      var f = {};
      var g = API.qs('#f_gender').value; if (g) f.gender = g;
      var gen = API.qs('#f_gen').value.trim(); if (gen) f.generation = gen;
      var amin = API.qs('#f_amin').value; if (amin) f.age_min = amin;
      var amax = API.qs('#f_amax').value; if (amax) f.age_max = amax;
      if (!API.qs('#f_excl').checked) f.include_past_winners = true; // ปิดสวิตช์ = อนุญาตให้ซ้ำ
      return f;
    }

    function selectedReward() {
      var i = API.qs('#reward').value;
      if (i === '') return { name: '', value: '' };
      var r = rewards[Number(i)] || {};
      return { name: r.name || '', value: r.value || '' };
    }

    function onChange() {
      clearTimeout(countTimer);
      countTimer = setTimeout(async function () {
        renderSummary('…');
        var res = await API.getAuth('getEligible', { filters: getFilters() });
        renderSummary(res.ok ? res.count : '?');
      }, 300);
    }

    function renderSummary(count) {
      var f = getFilters();
      var rw = selectedReward();
      var parts = [];
      parts.push('กลุ่ม: <b>' + (f.gender || 'ทั้งหมด') + (f.generation ? ' · รุ่น ' + f.generation : '') +
        ((f.age_min || f.age_max) ? ' · อายุ ' + (f.age_min || '0') + '-' + (f.age_max || '∞') : '') + '</b>');
      parts.push('รางวัล: <b>' + (rw.name || rw.value || 'ไม่ระบุ') + '</b>');
      parts.push('โหมด: <b>' + (mode === 'multi' ? ('หลายคน ×' + (API.qs('#count').value || 1)) : 'ทีละคน') + '</b>');
      parts.push('กันคนซ้ำ: <b>' + (API.qs('#f_excl').checked ? 'เปิด' : 'ปิด') + '</b>');
      var c = (count === undefined) ? (API.qs('#summary').dataset.c || '–') : count;
      if (count !== undefined) API.qs('#summary').dataset.c = count;
      parts.push('ผู้มีสิทธิ์: <span class="count">' + c + ' คน</span>');
      API.qs('#summary').innerHTML = parts.join(' · ');
    }

    function setMode(m) {
      mode = m;
      API.qs('#m-one').classList.toggle('active', m === 'one');
      API.qs('#m-multi').classList.toggle('active', m === 'multi');
      API.qs('#countWrap').style.display = (m === 'multi') ? 'block' : 'none';
      renderSummary();
    }

    async function spin() {
      var count = (mode === 'multi') ? Math.max(1, parseInt(API.qs('#count').value || 1, 10)) : 1;
      var rw = selectedReward();
      var btn = API.qs('#spinBtn'); btn.disabled = true; btn.textContent = 'กำลังหมุน...';

      var res = await API.postAuth('requestSpin', {
        filters: getFilters(), count: count,
        reward_name: rw.name, reward_value: rw.value
      });

      btn.disabled = false; btn.textContent = '🎉 หมุนวงล้อ';
      if (!res.ok) { API.toast(res.error === 'no eligible participants' ? 'ไม่มีผู้มีสิทธิ์ในกลุ่มนี้' : (res.error || 'หมุนไม่สำเร็จ')); return; }

      showResult(res.state);
      onChange();
    }

    function showResult(state) {
      var box = API.qs('#result');
      box.style.display = 'block';
      box.className = 'card gold-top';
      var rewardLabel = state.reward_name || state.reward_value || 'ของรางวัล';
      var html = '<h2>🏆 ผู้ชนะรอบ ' + state.round + '</h2><p class="muted">รางวัล: ' + rewardLabel + ' · ส่ง LINE แล้ว ✅</p>';
      (state.winners || []).forEach(function (w) {
        html += '<div class="winner-row"><span class="nm">' +
          (w.first_name || '') + ' ' + (w.last_name || '') +
          (w.nickname ? ' (' + w.nickname + ')' : '') + '</span></div>';
      });
      box.innerHTML = html;
      box.scrollIntoView({ behavior: 'smooth' });
    }

    async function resetWheel() {
      await API.postAuth('resetWheel', {});
      API.qs('#result').style.display = 'none';
      API.toast('ล้างจอแล้ว');
    }

    function openDisplay() { window.open('rewards.html', '_blank'); }
  </script>
</body>
</html>
