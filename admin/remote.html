<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>รีโมทจับรางวัล</title>
  <link rel="stylesheet" href="../theme.css" />
  <style>
    .summary { background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 14px; font-size: .88rem; }
    .summary b { color: var(--ink); }
    .summary .count { color: var(--accent-600); font-weight: 700; }
    .panel { display: none; }
    .panel.open { display: block; }
    .mode-toggle { display: flex; gap: 8px; }
    .mode-toggle button { flex: 1; padding: 12px; border: 1.5px solid var(--line); background: #fff; border-radius: var(--radius-sm); font-family: var(--font-body); font-weight: 600; color: var(--ink-soft); cursor: pointer; }
    .mode-toggle button.active { background: var(--navy-grad); color: #fff; border-color: transparent; }
    .switch-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px; border: 1.5px solid var(--line); border-radius: var(--radius-sm); margin-bottom: 12px; }
    .switch-row .lbl { font-weight: 600; font-size: .92rem; }
    .switch-row .sub { font-size: .76rem; color: var(--ink-soft); }
    .sw { position: relative; width: 52px; height: 30px; flex-shrink: 0; }
    .sw input { display: none; }
    .sw .track { position: absolute; inset: 0; background: var(--line); border-radius: 999px; transition: .2s; }
    .sw .track::after { content: ''; position: absolute; top: 3px; left: 3px; width: 24px; height: 24px; background: #fff; border-radius: 50%; transition: .2s; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
    .sw input:checked + .track { background: var(--ok); }
    .sw input:checked + .track::after { transform: translateX(22px); }

    /* ปุ่มแดงใหญ่ + เกจ */
    .spin-zone { text-align: center; padding: 8px 0 4px; }
    .gauge { height: 18px; border-radius: 999px; background: var(--line); overflow: hidden; margin: 0 0 18px; box-shadow: inset 0 2px 4px rgba(0,0,0,.15); }
    .gauge .fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg,#2ecc71,#f1c40f 55%,#e74c3c); transition: width .05s linear; }
    .gauge-label { font-size: .8rem; color: var(--ink-soft); margin-top: -12px; margin-bottom: 14px; }
    .bigbtn {
      width: 200px; height: 200px; border-radius: 50%; border: none; margin: 0 auto;
      background: radial-gradient(circle at 38% 32%, #ff6a5a, #e1241b 60%, #a8160f);
      color: #fff; font-family: var(--font-display); font-weight: 700; font-size: 1.5rem;
      box-shadow: 0 12px 30px rgba(200,30,20,.5), inset 0 -8px 16px rgba(0,0,0,.25), inset 0 6px 12px rgba(255,255,255,.3);
      cursor: pointer; user-select: none; -webkit-user-select: none; touch-action: none;
      transition: transform .08s, filter .1s; display: flex; align-items: center; justify-content: center; line-height: 1.2; text-align: center;
    }
    .bigbtn:active, .bigbtn.holding { transform: scale(.94); filter: brightness(1.1); }
    .bigbtn:disabled { background: #c7ccd6; box-shadow: none; cursor: not-allowed; color: #eef; }
    .winner-row { padding: 10px 12px; border: 1px solid var(--line); border-radius: var(--radius-sm); margin-bottom: 8px; }
    .winner-row .nm { font-weight: 700; font-family: var(--font-display); font-size: 1.1rem; }
    .hidden { display: none; }
    .btn-white { background: #fff; }
    .btn-white-mb { background: #fff; margin-bottom: 12px; }
    .mode-label { display: block; font-size: .85rem; font-weight: 600; color: var(--ink-soft); margin-bottom: 6px; }
  </style>
</head>
<body class="app-bg">
  <header class="page-header">
    <div class="ph-left">
      <img class="ph-logo" data-logo alt="">
      <div class="ph-info">
        <div class="ph-event" data-event-name>Event</div>
        <div class="ph-user"><span class="ph-role" id="ph-role">ADMIN</span></div>
      </div>
    </div>
    <div class="ph-center">
      <div class="ph-title">🎯 รีโมทจับรางวัล</div>
    </div>
    <div class="ph-right">
      <a href="index.html" class="ph-nav-btn">← Dashboard</a>
    </div>
  </header>

  <div class="container">
    <div id="loading" class="loading"><div class="spinner"></div>กำลังโหลด...</div>

    <div id="app" class="hidden">
      <div class="card gold-top">
        <div class="summary" id="summary"></div>
        <button type="button" class="btn btn-ghost btn-white-mb" onclick="togglePanel()">⚙️ ตั้งค่าการจับ</button>
        <button type="button" class="btn btn-primary" id="prepBtn" onclick="prepare()">📋 เตรียมวงล้อ (ส่งรายชื่อขึ้นจอ)</button>
      </div>

      <!-- แผงตั้งค่า -->
      <div class="card panel" id="panel">
        <h2>ตั้งค่าการจับ</h2>
        <div class="row">
          <div class="field">
            <label>เพศ</label>
            <select id="f_gender" onchange="onChange()">
              <option value="">ทั้งหมด</option><option value="ชาย">ชาย</option><option value="หญิง">หญิง</option><option value="อื่นๆ">อื่นๆ</option>
            </select>
          </div>
          <div class="field">
            <label>รุ่น</label>
            <input class="input" id="f_gen" placeholder="ว่าง = ทุกรุ่น" oninput="onChange()" />
          </div>
        </div>
        <div class="row">
          <div class="field"><label>อายุต่ำสุด</label><input class="input" id="f_amin" type="number" inputmode="numeric" placeholder="-" oninput="onChange()" /></div>
          <div class="field"><label>อายุสูงสุด</label><input class="input" id="f_amax" type="number" inputmode="numeric" placeholder="-" oninput="onChange()" /></div>
        </div>
        <div class="switch-row">
          <div><div class="lbl">กันคนที่เคยถูกรางวัล</div><div class="sub">เปิด = คนถูกแล้วไม่ถูกซ้ำ</div></div>
          <label class="sw"><input type="checkbox" id="f_excl" checked onchange="onChange()" /><span class="track"></span></label>
        </div>
        <div class="field"><label>ของรางวัล</label><select id="reward" onchange="onChange()"></select></div>
        <label class="mode-label">โหมดการจับ</label>
        <div class="mode-toggle">
          <button type="button" id="m-one" class="active" onclick="setMode('single')">ทีละคน</button>
          <button type="button" id="m-multi" onclick="setMode('multi')">หลายคนพร้อมกัน</button>
        </div>
        <div class="field mt hidden" id="countWrap">
          <label>จำนวนผู้ชนะต่อการหมุน</label>
          <input class="input" id="count" type="number" inputmode="numeric" value="3" min="1" max="50" oninput="onChange()" />
        </div>
        <button type="button" class="btn btn-primary mt" onclick="donePanel()">เสร็จ</button>
      </div>

      <!-- โซนหมุน -->
      <div class="card spin-zone hidden" id="spinZone">
        <div class="gauge"><div class="fill" id="gaugeFill"></div></div>
        <div class="gauge-label" id="gaugeLabel">กดปุ่มค้างเพื่อชาร์จพลัง แล้วปล่อย</div>
        <button type="button" class="bigbtn" id="bigBtn" disabled>กดค้าง<br>เพื่อหมุน</button>
      </div>

      <div class="row mt">
        <button type="button" class="btn btn-ghost btn-sm btn-white" onclick="resetWheel()">↺ ล้างจอ</button>
        <button type="button" class="btn btn-ghost btn-sm btn-white" onclick="openDisplay()">🖥️ เปิดจอวงล้อ</button>
      </div>

      <div id="result" class="card hidden"></div>
    </div>
  </div>

  <script src="../config.js"></script>
  <script src="../api.js"></script>
  <script>
    var session, mode = 'single', rewards = [], countTimer;
    var prepared = false, holding = false, holdRAF = null, holdStart = 0, power = 0;
    var CHARGE_MS = 1600;

    function goBack() { location.href = '../staff/index.html'; }

    (async function () {
      session = API.getSession();
      if (!session || !session.username) { location.href = '../staff/index.html'; return; }
      await API.bootTheme().catch(function () {});
      var rw = await API.get('getRewards');
      rewards = (rw.rewards || []);
      var sel = API.qs('#reward');
      sel.innerHTML = '<option value="">— ไม่ระบุของรางวัล —</option>';
      rewards.forEach(function (r, i) {
        sel.innerHTML += '<option value="' + i + '">' + ((r.name || '') + (r.value ? ' (' + r.value + ')' : '')) + '</option>';
      });
      API.qs('#loading').classList.add('hidden');
      API.qs('#app').classList.remove('hidden');
      bindHold();
      onChange();
    })();

    function togglePanel() { API.qs('#panel').classList.toggle('open'); renderSummary(); }

    function getFilters() {
      var f = {};
      var g = API.qs('#f_gender').value; if (g) f.gender = g;
      var gen = API.qs('#f_gen').value.trim(); if (gen) f.generation = gen;
      var amin = API.qs('#f_amin').value; if (amin) f.age_min = amin;
      var amax = API.qs('#f_amax').value; if (amax) f.age_max = amax;
      if (!API.qs('#f_excl').checked) f.include_past_winners = true;
      return f;
    }
    function selectedReward() {
      var i = API.qs('#reward').value;
      if (i === '') return { name: '', value: '' };
      var r = rewards[Number(i)] || {};
      return { name: r.name || '', value: r.value || '' };
    }

    function onChange() {
      // แก้ค่าใด ๆ = ต้องเตรียมใหม่
      invalidatePrepare();
      clearTimeout(countTimer);
      countTimer = setTimeout(async function () {
        renderSummary('…');
        var res = await API.getAuth('getEligible', { filters: getFilters() });
        renderSummary(res.ok ? res.count : '?');
      }, 300);
    }

    function renderSummary(count) {
      var f = getFilters(), rw = selectedReward();
      var parts = [];
      parts.push('กลุ่ม: <b>' + (f.gender || 'ทั้งหมด') + (f.generation ? ' · รุ่น ' + f.generation : '') + ((f.age_min || f.age_max) ? ' · อายุ ' + (f.age_min || '0') + '-' + (f.age_max || '∞') : '') + '</b>');
      parts.push('รางวัล: <b>' + (rw.name || rw.value || 'ไม่ระบุ') + '</b>');
      parts.push('โหมด: <b>' + (mode === 'multi' ? ('หลายคน ×' + (API.qs('#count').value || 1)) : 'ทีละคน') + '</b>');
      parts.push('กันคนซ้ำ: <b>' + (API.qs('#f_excl').checked ? 'เปิด' : 'ปิด') + '</b>');
      if (count !== undefined) API.qs('#summary').dataset.c = count;
      parts.push('ผู้มีสิทธิ์: <span class="count">' + (API.qs('#summary').dataset.c || '–') + ' คน</span>');
      API.qs('#summary').innerHTML = parts.join(' · ');
    }

    function setMode(m) {
      mode = m;
      API.qs('#m-one').classList.toggle('active', m === 'single');
      API.qs('#m-multi').classList.toggle('active', m === 'multi');
      API.qs('#countWrap').classList.toggle('hidden', m !== 'multi');
      invalidatePrepare(); renderSummary();
    }

    function invalidatePrepare() {
      prepared = false;
      API.qs('#bigBtn').disabled = true;
      API.qs('#bigBtn').innerHTML = 'กดค้าง<br>เพื่อหมุน';
      API.qs('#gaugeLabel').textContent = 'กดเตรียมวงล้อก่อนหมุน';
    }

    function donePanel() { API.qs('#panel').classList.remove('open'); renderSummary(); prepare(); }

    // ----- เตรียม -----
    async function prepare(opts) {
      opts = opts || {};
      var rw = selectedReward();
      var count = (mode === 'multi') ? Math.max(1, parseInt(API.qs('#count').value || 1, 10)) : 1;
      var pbtn = API.qs('#prepBtn');
      if (!opts.silent) { pbtn.disabled = true; pbtn.textContent = 'กำลังส่งรายชื่อขึ้นจอ...'; }
      API.qs('#spinZone').classList.remove('hidden');
      API.qs('#gaugeLabel').textContent = 'กำลังเตรียมวงล้อ...';
      var b = API.qs('#bigBtn'); b.disabled = true;

      var res = await API.postAuth('prepare', { filters: getFilters(), mode: mode, count: count, reward_name: rw.name, reward_value: rw.value });
      if (!opts.silent) { pbtn.disabled = false; pbtn.textContent = '📋 เตรียมวงล้อ (ส่งรายชื่อขึ้นจอ)'; }

      if (!res.ok) {
        prepared = false;
        API.qs('#gaugeLabel').textContent = (res.error === 'no eligible participants') ? 'ไม่มีผู้มีสิทธิ์เหลือแล้ว' : 'เตรียมไม่สำเร็จ';
        if (!opts.silent) API.toast(res.error === 'no eligible participants' ? 'ไม่มีผู้มีสิทธิ์ในกลุ่มนี้' : (res.error || 'เตรียมไม่สำเร็จ'));
        return;
      }
      // อัปเดตจำนวนผู้มีสิทธิ์ในสรุป
      API.qs('#summary').dataset.c = res.people; renderSummary();
      if (!opts.keepResult) API.qs('#result').classList.add('hidden');

      // รอจอรับรายชื่อ (~1.8 วิ) แล้วเปิดปุ่มหมุน
      setTimeout(function () {
        prepared = true;
        b.disabled = false; b.innerHTML = 'กดค้าง<br>เพื่อหมุน';
        API.qs('#gaugeLabel').textContent = (mode === 'multi' ? ('พร้อม! จับ ' + count + ' คน — กดค้างแล้วปล่อย') : 'พร้อม! กดค้างชาร์จพลังแล้วปล่อย');
        if (!opts.silent) API.toast('พร้อมหมุนแล้ว (' + res.people + ' คน)');
      }, 1800);
    }

    // ----- ปุ่มกดค้าง -----
    function bindHold() {
      var b = API.qs('#bigBtn');
      b.addEventListener('pointerdown', startHold);
      b.addEventListener('pointerup', endHold);
      b.addEventListener('pointerleave', cancelHold);
      b.addEventListener('pointercancel', cancelHold);
      b.addEventListener('contextmenu', function (e) { e.preventDefault(); });
    }
    function startHold(e) {
      if (!prepared) return;
      e.preventDefault();
      holding = true; holdStart = performance.now();
      API.qs('#bigBtn').classList.add('holding');
      tickHold();
    }
    function tickHold() {
      if (!holding) return;
      var el = performance.now() - holdStart;
      power = Math.min(100, Math.round(el / CHARGE_MS * 100));
      API.qs('#gaugeFill').style.width = power + '%';
      API.qs('#gaugeLabel').textContent = 'พลัง ' + power + '%';
      holdRAF = requestAnimationFrame(tickHold);
    }
    function endHold(e) {
      if (!holding) return;
      holding = false; cancelAnimationFrame(holdRAF);
      API.qs('#bigBtn').classList.remove('holding');
      var p = Math.max(8, power); // กันกดเร็วเกินจนแรง 0
      doSpin(p);
    }
    function cancelHold() {
      if (!holding) return;
      holding = false; cancelAnimationFrame(holdRAF);
      API.qs('#bigBtn').classList.remove('holding');
      API.qs('#gaugeFill').style.width = '0%';
    }

    async function doSpin(p) {
      prepared = false;
      var b = API.qs('#bigBtn'); b.disabled = true; b.innerHTML = 'กำลัง<br>หมุน...';
      API.qs('#gaugeLabel').textContent = 'หมุนที่จอ... แรง ' + p + '%';
      var res = await API.postAuth('spinPhysics', { power: p });
      if (!res.ok) { API.toast(res.error === 'no eligible participants' ? 'ไม่มีผู้มีสิทธิ์' : (res.error || 'หมุนไม่สำเร็จ')); invalidatePrepare(); return; }

      var dur = 3.5 + (p / 100) * 3.5;
      setTimeout(async function () {
        var st = await API.get('getWheelState');
        showResult(st.state || {});
        API.qs('#gaugeFill').style.width = '0%';
        // เตรียมรอบใหม่อัตโนมัติ (รายชื่ออัปเดต/ตัดคนที่เพิ่งได้) — กดหมุนต่อได้เลย
        prepare({ silent: true, keepResult: true });
      }, dur * 1000 + 400);
    }

    function showResult(state) {
      var winners = state.winners || (state.winner ? [state.winner] : []);
      var box = API.qs('#result'); box.classList.remove('hidden'); box.className = 'card gold-top';
      var rewardLabel = state.reward_name || state.reward_value || 'ของรางวัล';
      var html = '<h2>🏆 ผู้ชนะรอบ ' + (state.round || '') + '</h2><p class="muted">รางวัล: ' + rewardLabel + ' · ส่ง LINE แล้ว ✅</p>';
      winners.forEach(function (w) {
        html += '<div class="winner-row"><span class="nm">' + (w.first_name || '') + ' ' + (w.last_name || '') + (w.nickname ? ' (' + w.nickname + ')' : '') + '</span></div>';
      });
      if (!winners.length) html += '<p class="muted">—</p>';
      box.innerHTML = html;
      box.scrollIntoView({ behavior: 'smooth' });
    }

    async function resetWheel() { await API.postAuth('resetWheel', {}); API.qs('#result').classList.add('hidden'); invalidatePrepare(); API.toast('ล้างจอแล้ว'); }
    function openDisplay() { window.open('rewards.html', '_blank'); }
  </script>
</body>
</html>
